<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#ff7a45">
  <title>Kids Lab｜Kai AI Workshop</title>
  <meta name="description" content="一個為孩子準備的互動探索空間，選一座喜歡的樂園開始玩。">
  <meta property="og:image" content="./image/kids-lab-cover.png">
  <link rel="icon" type="image/png" href="./image/kids-lab-icon.png">
  <link rel="apple-touch-icon" href="./image/kids-lab-icon.png">
  <style>
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:#332f3a;background:#fff9ef;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;-webkit-text-size-adjust:100%;touch-action:manipulation}a{color:inherit;text-decoration:none}header{height:64px;display:flex;align-items:center;justify-content:space-between;max-width:1120px;margin:auto;padding:0 24px}.brand{font-weight:900;letter-spacing:-.02em}.brand span{color:#ff6745}.back{font-size:.86rem;font-weight:700;color:#625d69}.hero{overflow:hidden;text-align:center;background:linear-gradient(145deg,#fff1cf 0%,#ffe9dc 48%,#e5f7ef 100%)}.hero-art{display:block;width:100%;height:clamp(280px,40vw,520px);object-fit:cover}.hero-copy{position:relative;padding:44px 24px 48px}.eyebrow{color:#e45d39;font-size:.74rem;font-weight:900;letter-spacing:.16em}.hero h1{margin:12px auto 14px;font-size:clamp(2.3rem,7vw,4.6rem);line-height:1.05;letter-spacing:-.06em}.hero p{max-width:620px;margin:auto;color:#6f6571;line-height:1.8;font-weight:600}.sparkles{margin-top:24px;font-size:1.5rem;letter-spacing:.55em}.projects{max-width:1050px;margin:auto;padding:64px 24px 90px}.intro{margin-bottom:28px}.intro h2{font-size:clamp(1.55rem,3vw,2.2rem);margin:0 0 8px}.intro p{margin:0;color:#756d77}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}.card{overflow:hidden;border-radius:28px;background:#fff;box-shadow:0 12px 40px rgba(98,72,49,.1);transition:.2s transform,.2s box-shadow}.card:hover{transform:translateY(-5px);box-shadow:0 18px 44px rgba(98,72,49,.16)}.card img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover}.body{padding:24px}.type{display:inline-block;padding:6px 11px;border-radius:999px;background:#fff0de;color:#d95e35;font-size:.72rem;font-weight:900}.card:nth-child(2) .type{background:#e8f8f2;color:#188c76}.body h2{margin:12px 0 8px;font-size:1.45rem}.body p{margin:0;color:#746d76;line-height:1.65}.go{display:inline-block;margin-top:18px;font-weight:900;color:#ff6745}footer{text-align:center;padding:26px;color:#8b838c;font-size:.78rem;border-top:1px solid #eadfd1}@media(max-width:680px){header{height:58px;padding:0 18px}.hero-art{height:260px}.hero-copy{padding:36px 20px 40px}.grid{grid-template-columns:1fr}.projects{padding:45px 18px 65px}.card{border-radius:22px}.body{padding:20px}}
  </style>
</head>
<body>
  <header>
    <a class="brand" href="./">Kai AI Workshop <span>· Kids Lab</span></a>
    <a class="back" href="../">← 回到工作室</a>
  </header>
  <main>
    <section class="hero">
      <img class="hero-art" src="./image/kids-lab-cover.png" alt="兔子和星星一起探索 Kids Lab 的奇妙世界">
      <div class="hero-copy">
        <div class="eyebrow">WELCOME TO KIDS LAB</div>
        <h1>今天想玩什麼？</h1>
        <p>這裡沒有厚厚的說明書。選一個喜歡的樂園，聽一聽、點一點、自己試試看。</p>
        <div class="sparkles" aria-hidden="true">✦ ● ▲ ♪</div>
      </div>
    </section>
    <section class="projects">
      <div class="intro">
        <h2>兩座學習樂園，慢慢探索</h2>
        <p>手機、平板和電腦都能玩。</p>
      </div>
      <div class="grid">
        <a class="card" href="../bopomofo/">
          <img src="../bopomofo/image/cover.png" alt="注音樂園">
          <div class="body">
            <span class="type">ㄅ ㄆ ㄇ</span>
            <h2>注音樂園</h2>
            <p>看筆順、練描字、聽發音，再進遊戲裡熟悉每個注音。</p>
            <span class="go">進入樂園 →</span>
          </div>
        </a>
        <a class="card" href="../kids-math/">
          <img src="../kids-math/image/cover.png" alt="數學樂園">
          <div class="body">
            <span class="type">1 ＋ 2</span>
            <h2>數學樂園</h2>
            <p>從數數、形狀到加減法，選擇練習或挑戰，照自己的速度前進。</p>
            <span class="go">開始玩 →</span>
          </div>
        </a>
      </div>
    </section>
  </main>
  <footer>Kai AI Workshop · Kids Lab</footer>
</body>
</html>
