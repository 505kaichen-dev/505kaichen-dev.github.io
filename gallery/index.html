<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#15151b">
  <title>Visual Archive｜Kai AI Workshop</title>
  <meta name="description" content="Kai AI Workshop 的視覺檔案館：專案封面、兒童世界、技術故事與製作過程。">
  <style>
    :root{--ink:#17171d;--muted:#73717b;--paper:#f6f3ed;--line:#ded9d0;--orange:#ff6b3d;--purple:#6965e8;--mint:#87d7bf}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;-webkit-font-smoothing:antialiased}button,a{font:inherit}a{color:inherit;text-decoration:none}button{color:inherit}
    nav{height:68px;border-bottom:1px solid var(--line);background:rgba(246,243,237,.92);backdrop-filter:blur(14px);position:sticky;top:0;z-index:20}.nav-inner{max-width:1240px;height:100%;margin:auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between}.logo{font-weight:900;letter-spacing:-.03em}.logo span{color:var(--purple)}.back{font-size:.82rem;font-weight:800;color:var(--muted)}
    .hero{max-width:1240px;margin:auto;padding:84px 28px 70px;display:grid;grid-template-columns:1.2fr .8fr;gap:60px;align-items:end}.eyebrow{font-size:.72rem;font-weight:900;letter-spacing:.16em;color:var(--orange);text-transform:uppercase}.hero h1{font-size:clamp(3.2rem,8vw,7.2rem);line-height:.9;letter-spacing:-.075em;margin:16px 0 24px}.hero h1 em{display:block;color:var(--purple);font-style:normal}.hero-copy{max-width:520px;color:var(--muted);line-height:1.85;font-size:.98rem}.hero-note{border-left:1px solid var(--line);padding:10px 0 10px 28px;color:var(--muted);font-size:.82rem;line-height:1.8}.hero-note strong{display:block;color:var(--ink);font-size:1.1rem;margin-bottom:6px}
    .rooms{max-width:1240px;margin:auto;padding:0 28px 76px}.section-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:22px}.section-head h2{font-size:1.55rem;margin:0}.section-head p{font-size:.8rem;color:var(--muted);margin:0}.room-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.room{position:relative;min-height:230px;border:0;border-radius:22px;overflow:hidden;padding:0;cursor:pointer;text-align:left;background:#222}.room img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .45s}.room:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 25%,rgba(10,10,14,.82))}.room:hover img{transform:scale(1.045)}.room-copy{position:absolute;z-index:1;left:20px;right:18px;bottom:18px;color:#fff}.room-copy span{font-size:.66rem;font-weight:900;letter-spacing:.13em;text-transform:uppercase;opacity:.78}.room-copy h3{font-size:1.2rem;margin:5px 0 0}
    .archive{border-top:1px solid var(--line);padding:68px 0 90px}.archive-inner{max-width:1240px;margin:auto;padding:0 28px}.archive-top{display:flex;gap:25px;justify-content:space-between;align-items:end;margin-bottom:28px}.archive-title h2{font-size:clamp(2rem,4vw,3.2rem);letter-spacing:-.045em;margin:0 0 7px}.archive-title p{margin:0;color:var(--muted);font-size:.85rem}.filters{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px}.filter{border:1px solid var(--line);background:transparent;border-radius:999px;padding:9px 14px;font-size:.75rem;font-weight:800;cursor:pointer;transition:.2s}.filter:hover,.filter.active{background:var(--ink);border-color:var(--ink);color:#fff}.count{font-size:.72rem;color:var(--muted);margin-bottom:18px}
    .wall{columns:4 250px;column-gap:14px}.art{position:relative;break-inside:avoid;margin:0 0 14px;border-radius:16px;overflow:hidden;background:#e9e5dd;cursor:zoom-in}.art img{display:block;width:100%;height:auto;min-height:150px;object-fit:cover;transition:transform .35s,filter .35s}.art:hover img{transform:scale(1.025);filter:brightness(.72)}.art-info{position:absolute;inset:auto 0 0;padding:42px 16px 15px;color:#fff;background:linear-gradient(transparent,rgba(10,10,14,.88));opacity:0;transform:translateY(6px);transition:.25s}.art:hover .art-info{opacity:1;transform:none}.art-project{font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;opacity:.72}.art-title{font-size:.9rem;font-weight:800;margin-top:4px;line-height:1.35}.empty{text-align:center;color:var(--muted);padding:80px 20px;display:none}
    .lightbox{position:fixed;inset:0;background:rgba(12,12,16,.94);z-index:50;display:none;align-items:center;justify-content:center;padding:28px}.lightbox.open{display:flex}.lightbox-card{width:min(1120px,100%);height:min(780px,92vh);display:grid;grid-template-columns:minmax(0,1fr) 280px;background:#1c1c23;border:1px solid #33333d;border-radius:22px;overflow:hidden;color:#fff}.lightbox-stage{position:relative;display:flex;align-items:center;justify-content:center;background:#111116;min-width:0}.lightbox-stage img{max-width:100%;max-height:100%;object-fit:contain}.lightbox-info{padding:28px;display:flex;flex-direction:column}.lightbox-kicker{color:#aaa7b6;font-size:.67rem;letter-spacing:.12em;text-transform:uppercase}.lightbox-info h2{font-size:1.45rem;line-height:1.25;margin:10px 0}.lightbox-index{font-size:.72rem;color:#888693}.project-link{margin-top:auto;display:inline-flex;align-items:center;justify-content:center;background:#fff;color:#17171d;border-radius:999px;padding:12px;font-size:.76rem;font-weight:900}.close{position:absolute;right:18px;top:16px;z-index:2;width:38px;height:38px;border:0;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font-size:1.1rem;cursor:pointer}.nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:52px;border:0;background:rgba(255,255,255,.12);color:#fff;font-size:1.3rem;cursor:pointer}.prev{left:12px}.next{right:12px}footer{border-top:1px solid var(--line);padding:28px;text-align:center;color:var(--muted);font-size:.75rem}
    @media(max-width:900px){.hero{grid-template-columns:1fr;padding-top:58px;gap:22px}.hero-note{max-width:520px}.room-grid{grid-template-columns:repeat(2,1fr)}.room{min-height:210px}.archive-top{display:block}.filters{justify-content:flex-start;margin-top:22px}.lightbox-card{grid-template-columns:1fr;height:92vh}.lightbox-info{padding:18px;min-height:145px}.project-link{margin-top:14px}.lightbox-stage{min-height:0}}
    @media(max-width:560px){nav{height:58px}.nav-inner,.hero,.rooms,.archive-inner{padding-left:18px;padding-right:18px}.hero{padding-top:46px;padding-bottom:52px}.hero h1{font-size:3.35rem}.room-grid{grid-template-columns:1fr 1fr;gap:9px}.room{min-height:175px;border-radius:17px}.room-copy{left:14px;bottom:14px}.room-copy h3{font-size:.96rem}.section-head p{display:none}.wall{columns:2 145px;column-gap:9px}.art{margin-bottom:9px;border-radius:12px}.art-info{opacity:1;transform:none;padding:30px 10px 10px}.art-project{display:none}.art-title{font-size:.72rem}.lightbox{padding:8px}.lightbox-card{border-radius:15px}.lightbox-info h2{font-size:1.1rem}}
  </style>
</head>
<body>
  <nav><div class="nav-inner"><a class="logo" href="../">Kai <span>AI Workshop</span></a><a class="back" href="../">← 回到工作室</a></div></nav>
  <main>
    <section class="hero">
      <div><div class="eyebrow">Visual Archive · 視覺檔案館</div><h1>每個專案，<em>都有畫面。</em></h1><p class="hero-copy">這裡不只是漂亮圖片的集合。它們是概念第一次有了形狀、工具開始能被理解，以及一個小世界逐漸長出來的紀錄。</p></div>
      <div class="hero-note"><strong>不是素材倉庫，是工作室的視覺足跡。</strong>封面、角色、介面與過程，各自回到它誕生的專案裡；也可以只憑感覺，隨意逛逛。</div>
    </section>
    <section class="rooms">
      <div class="section-head"><h2>先選一間展間</h2><p>或繼續往下瀏覽全部作品</p></div>
      <div class="room-grid">
        <button class="room" data-room="kids"><img src="../kids/image/kids-lab-cover.png" alt="兒童世界"><span class="room-copy"><span>Kids Lab</span><h3>兒童世界</h3></span></button>
        <button class="room" data-room="story"><img src="../html5-story/image/cover.png" alt="視覺敘事"><span class="room-copy"><span>Visual stories</span><h3>視覺敘事</h3></span></button>
        <button class="room" data-room="build"><img src="../3mf-explorer/image/3mf-explorer-library.png" alt="介面與工具"><span class="room-copy"><span>Tools & UI</span><h3>介面與工具</h3></span></button>
        <button class="room" data-room="brand"><img src="../dradvice01/image/dradvice01.png" alt="品牌與封面"><span class="room-copy"><span>Identity</span><h3>品牌與封面</h3></span></button>
      </div>
    </section>
    <section class="archive" id="archive"><div class="archive-inner">
      <div class="archive-top"><div class="archive-title"><h2>作品牆</h2><p>從成品到過程，點開圖片可以回到它的原始專案。</p></div><div class="filters" id="filters">
        <button class="filter active" data-filter="all">全部</button><button class="filter" data-filter="featured">精選</button><button class="filter" data-filter="kids">Kids Lab</button><button class="filter" data-filter="story">視覺敘事</button><button class="filter" data-filter="build">介面工具</button><button class="filter" data-filter="brand">品牌封面</button>
      </div></div>
      <div class="count" id="count"></div><div class="wall" id="wall"></div><div class="empty" id="empty">這間展間還沒有作品。</div>
    </div></section>
  </main>
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="圖片檢視器"><div class="lightbox-card"><div class="lightbox-stage"><button class="close" id="close" aria-label="關閉">×</button><button class="nav-arrow prev" id="prev" aria-label="上一張">‹</button><img id="lightboxImg" alt=""><button class="nav-arrow next" id="next" aria-label="下一張">›</button></div><div class="lightbox-info"><div class="lightbox-kicker" id="lightboxProject"></div><h2 id="lightboxTitle"></h2><div class="lightbox-index" id="lightboxIndex"></div><a class="project-link" id="projectLink" href="#">前往原專案 →</a></div></div></div>
  <footer>Kai AI Workshop · Visual Archive</footer>
  <script>
  const works=[
    {src:'../kids/image/kids-lab-cover.png',title:'通往想像世界的入口',project:'Kids Lab',cat:'kids',href:'../kids/',featured:1},
    {src:'../kids/image/kids-lab-icon.png',title:'Kids Lab 兔子書籤圖示',project:'Kids Lab',cat:'kids',href:'../kids/'},
    {src:'../bopomofo/image/cover.png',title:'注音樂園主視覺',project:'注音樂園',cat:'kids',href:'../bopomofo/',featured:1},
    {src:'../bopomofo/image/chart-cover.png',title:'注音總表入口',project:'注音樂園',cat:'kids',href:'../bopomofo/'},
    {src:'../bopomofo/image/learn-cover.png',title:'符號教學入口',project:'注音樂園',cat:'kids',href:'../bopomofo/'},
    {src:'../bopomofo/image/game-cover.png',title:'遊戲關卡入口',project:'注音樂園',cat:'kids',href:'../bopomofo/'},
    {src:'../bopomofo/image/game-listen.png',title:'聽音辨識遊戲',project:'注音樂園',cat:'kids',href:'../bopomofo/game/'},
    {src:'../bopomofo/image/game-picture.png',title:'看圖找注音遊戲',project:'注音樂園',cat:'kids',href:'../bopomofo/game/'},
    {src:'../kids-math/image/cover.png',title:'兒童數學學習樂園',project:'數學樂園',cat:'kids',href:'../kids-math/',featured:1},
    {src:'../kids-math/counting.png',title:'數數小世界',project:'數學樂園',cat:'kids',href:'../kids-math/'},
    {src:'../kids-math/addition.png',title:'加法練習世界',project:'數學樂園',cat:'kids',href:'../kids-math/'},
    {src:'../kids-math/subtraction.png',title:'減法練習世界',project:'數學樂園',cat:'kids',href:'../kids-math/'},
    {src:'../kids-math/shapes.png',title:'圖形探索世界',project:'數學樂園',cat:'kids',href:'../kids-math/'},
    {src:'../kids-math/mixed.png',title:'綜合挑戰世界',project:'數學樂園',cat:'kids',href:'../kids-math/'},
    {src:'../opensource-story/image/opensource-story.png',title:'開源運動的誕生',project:'開源故事',cat:'story',href:'../opensource-story/',featured:1},
    {src:'../html5-story/image/cover.png',title:'HTML5 的故事與創作可能性',project:'HTML5 Story',cat:'story',href:'../html5-story/',featured:1},
    {src:'../html5-story/image/image01.png',title:'從標準之爭開始',project:'HTML5 Story',cat:'story',href:'../html5-story/'},
    {src:'../html5-story/image/image02.png',title:'瀏覽器裡的新世界',project:'HTML5 Story',cat:'story',href:'../html5-story/'},
    {src:'../html5-story/image/image03.png',title:'網頁開始會動',project:'HTML5 Story',cat:'story',href:'../html5-story/'},
    {src:'../html5-story/image/image04.png',title:'創作者的工具箱',project:'HTML5 Story',cat:'story',href:'../html5-story/'},
    {src:'../html5-story/image/image05.png',title:'一個人的創作時代',project:'HTML5 Story',cat:'story',href:'../html5-story/'},
    {src:'../html5-story/image/chart01.png',title:'HTML5 發展圖表',project:'HTML5 Story',cat:'story',href:'../html5-story/'},
    {src:'../3dprint-traps/image/cover.png',title:'FDM 入坑指南',project:'3D 列印筆記',cat:'story',href:'../3dprint-traps/',featured:1},
    {src:'../3dprint-traps/image/image01.png',title:'踏入 3D 列印現場',project:'3D 列印筆記',cat:'story',href:'../3dprint-traps/'},
    {src:'../3dprint-traps/image/image02.png',title:'列印中的真實日常',project:'3D 列印筆記',cat:'story',href:'../3dprint-traps/'},
    {src:'../3dprint-traps/image/image03.png',title:'那些早晚會踩的坑',project:'3D 列印筆記',cat:'story',href:'../3dprint-traps/'},
    {src:'../3dprint-traps/image/image04.png',title:'從失敗裡調整',project:'3D 列印筆記',cat:'story',href:'../3dprint-traps/'},
    {src:'../3mf-explorer/image/cover.png',title:'3MF Explorer',project:'3MF Explorer',cat:'build',href:'../3mf-explorer/',featured:1},
    {src:'../3mf-explorer/image/windows-explorer-problem.png',title:'檔案總管的模型辨識困境',project:'3MF Explorer',cat:'build',href:'../3mf-explorer/'},
    {src:'../3mf-explorer/image/3mf-explorer-library.png',title:'模型縮圖資料庫',project:'3MF Explorer',cat:'build',href:'../3mf-explorer/'},
    {src:'../web-planner/image/cover.png',title:'AI 網頁專案生成小幫手',project:'Web Planner',cat:'build',href:'../web-planner/',featured:1},
    {src:'../web-planner/image/image01.png',title:'需求引導介面',project:'Web Planner',cat:'build',href:'../web-planner/'},
    {src:'../web-planner/image/image02.png',title:'逐步整理網站想法',project:'Web Planner',cat:'build',href:'../web-planner/'},
    {src:'../web-planner/image/image03.png',title:'生成可交付需求單',project:'Web Planner',cat:'build',href:'../web-planner/'},
    {src:'../form-guide/image/cover.png',title:'讓網頁會收資料',project:'Form Guide',cat:'build',href:'../form-guide/'},
    {src:'../form-guide/image/image01.png',title:'靜態網頁串接資料',project:'Form Guide',cat:'build',href:'../form-guide/'},
    {src:'../form-guide/image/image02.png',title:'表單設定過程',project:'Form Guide',cat:'build',href:'../form-guide/'},
    {src:'../form-guide/image/image03.png',title:'資料流動方式',project:'Form Guide',cat:'build',href:'../form-guide/'},
    {src:'../form-guide/image/image04.png',title:'完成後的資料表',project:'Form Guide',cat:'build',href:'../form-guide/'},
    {src:'../food-spinner/image/cover.png',title:'附近餐廳轉盤',project:'吃什麼？',cat:'build',href:'../food-spinner/'},
    {src:'../storagemaster/image/cover.png',title:'企業儲存技術知識庫',project:'Storage Master',cat:'build',href:'../storagemaster/'},
    {src:'../ai-guide/image/ai-guide.png',title:'AI 宇宙指南',project:'AI Guide',cat:'brand',href:'../ai-guide/',featured:1},
    {src:'../claude-web-guide/image/claude-web-guide.png',title:'Claude 網頁開發指南',project:'Claude Web Guide',cat:'brand',href:'../claude-web-guide/'},
    {src:'../ai-coding-guide/image/cover.png',title:'AI 寫程式工具指南',project:'AI Coding Guide',cat:'brand',href:'../ai-coding-guide/'},
    {src:'../localai-image/image/LocalAI_Image.png',title:'本地 AI 商業圖片教材',project:'LocalAI Image',cat:'brand',href:'../localai-image/'},
    {src:'../dradvice01/image/dradvice01.png',title:'益生菌品牌落地頁',project:'健康力品牌設計',cat:'brand',href:'../dradvice01/',featured:1}
  ];
  const wall=document.getElementById('wall'),count=document.getElementById('count'),empty=document.getElementById('empty');let current='all',visible=[],activeIndex=0;
  function render(filter='all'){
    current=filter;visible=works.filter(w=>filter==='all'||(filter==='featured'?w.featured:w.cat===filter));
    wall.innerHTML=visible.map((w,i)=>`<article class="art" data-index="${i}" tabindex="0"><img src="${w.src}" alt="${w.title}" loading="lazy"><div class="art-info"><div class="art-project">${w.project}</div><div class="art-title">${w.title}</div></div></article>`).join('');
    count.textContent=`目前展出 ${visible.length} 件作品`;empty.style.display=visible.length?'none':'block';
    document.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.dataset.filter===filter));
  }
  function openLightbox(i){activeIndex=i;const w=visible[i];document.getElementById('lightboxImg').src=w.src;document.getElementById('lightboxImg').alt=w.title;document.getElementById('lightboxProject').textContent=w.project;document.getElementById('lightboxTitle').textContent=w.title;document.getElementById('lightboxIndex').textContent=`${i+1} / ${visible.length}`;document.getElementById('projectLink').href=w.href;document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden'}
  function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow=''}
  function move(step){openLightbox((activeIndex+step+visible.length)%visible.length)}
  document.getElementById('filters').addEventListener('click',e=>{const b=e.target.closest('[data-filter]');if(b)render(b.dataset.filter)});
  document.querySelector('.room-grid').addEventListener('click',e=>{const b=e.target.closest('[data-room]');if(b){render(b.dataset.room);document.getElementById('archive').scrollIntoView({behavior:'smooth'})}});
  wall.addEventListener('click',e=>{const a=e.target.closest('.art');if(a)openLightbox(+a.dataset.index)});wall.addEventListener('keydown',e=>{const a=e.target.closest('.art');if(a&&(e.key==='Enter'||e.key===' ')){e.preventDefault();openLightbox(+a.dataset.index)}});
  document.getElementById('close').onclick=closeLightbox;document.getElementById('prev').onclick=()=>move(-1);document.getElementById('next').onclick=()=>move(1);document.getElementById('lightbox').addEventListener('click',e=>{if(e.target.id==='lightbox')closeLightbox()});document.addEventListener('keydown',e=>{if(!document.getElementById('lightbox').classList.contains('open'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')move(-1);if(e.key==='ArrowRight')move(1)});render();
  </script>
</body>
</html>
