<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 圖像創作集 — Kai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F8F9FC;
    --surface: #FFFFFF;
    --ink: #0D0F14;
    --ink-muted: #6B7280;
    --ink-faint: #9CA3AF;
    --blue: #2563EB;
    --blue-light: #EFF4FF;
    --line: #E5E7EB;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(248,249,252,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
  }

  .nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 48px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .nav-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: -0.02em;
  }

  .nav-logo span { color: var(--blue); }

  .nav-back {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--ink-muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-back:hover { color: var(--ink); }

  .nav-back svg { width: 16px; height: 16px; }

  /* ── HEADER ── */
  .page-header {
    padding: 100px 48px 48px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .page-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--blue);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .page-eyebrow::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--blue);
  }

  .page-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .page-desc {
    font-size: 1rem;
    color: var(--ink-muted);
    max-width: 480px;
    line-height: 1.7;
  }

  /* ── MASONRY GRID ── */
  .gallery-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 48px 80px;
  }

  .gallery-grid {
    columns: 3;
    column-gap: 20px;
  }

  .gallery-item {
    break-inside: avoid;
    margin-bottom: 20px;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: var(--blue-light);
    display: block;
  }

  .gallery-item img {
    width: 100%;
    display: block;
    transition: transform 0.4s ease;
  }

  /* Hover overlay */
  .gallery-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(13,15,20,0.75) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
  }

  .gallery-item:hover .gallery-overlay { opacity: 1; }
  .gallery-item:hover img { transform: scale(1.03); }

  .gallery-tool {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 8px;
    width: fit-content;
  }

  .gallery-caption {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: #fff;
    line-height: 1.3;
  }

  /* Expand icon */
  .gallery-expand {
    position: absolute;
    top: 12px; right: 12px;
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
    color: #fff;
  }

  .gallery-item:hover .gallery-expand { opacity: 1; }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 500;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(20px);
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .lightbox.open { display: flex; }

  .lightbox-inner {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .lightbox-img {
    max-width: 100%;
    max-height: 80vh;
    border-radius: var(--radius);
    object-fit: contain;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }

  .lightbox-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .lightbox-tool {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 4px 12px;
    border-radius: 100px;
  }

  .lightbox-caption {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
  }

  .lightbox-close {
    position: fixed;
    top: 20px; right: 20px;
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #fff;
    transition: background 0.2s;
    backdrop-filter: blur(8px);
  }

  .lightbox-close:hover { background: rgba(255,255,255,0.2); }

  /* Nav arrows */
  .lightbox-prev, .lightbox-next {
    position: fixed;
    top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #fff;
    transition: background 0.2s;
    backdrop-filter: blur(8px);
  }

  .lightbox-prev { left: 20px; }
  .lightbox-next { right: 20px; }
  .lightbox-prev:hover, .lightbox-next:hover { background: rgba(255,255,255,0.2); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--ink-faint);
    display: none;
  }

  .empty-state.show { display: block; }

  .empty-state p { font-size: 0.95rem; margin-top: 8px; }

  /* ── COUNT ── */
  .gallery-count {
    font-size: 0.8rem;
    color: var(--ink-faint);
    margin-bottom: 24px;
  }

  /* ── FOOTER ── */
  footer {
    padding: 32px 48px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--ink);
    letter-spacing: -0.02em;
    text-decoration: none;
  }

  .footer-logo span { color: var(--blue); }

  .footer-note {
    font-size: 0.8rem;
    color: var(--ink-faint);
  }

  /* ── REVEAL ── */
  .reveal {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .nav-inner { padding: 0 24px; }
    .page-header { padding: 90px 24px 36px; }
    .filter-bar { padding: 0 24px 32px; }
    .gallery-wrap { padding: 0 24px 60px; }
    .gallery-grid { columns: 2; }
    footer { padding: 24px; flex-direction: column; gap: 10px; text-align: center; }
  }

  @media (max-width: 540px) {
    .gallery-grid { columns: 1; }
    .page-title { font-size: 1.8rem; }
    .lightbox-prev { left: 8px; }
    .lightbox-next { right: 8px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="../" class="nav-logo">Kai<span>.</span></a>
    <a href="../" class="nav-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M10 4l-4 4 4 4"/>
      </svg>
      回首頁
    </a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-eyebrow">AI Creative Gallery</div>
  <h1 class="page-title">AI 圖像創作集</h1>
  <p class="page-desc">用 AI 工具生成的視覺創作，探索提示詞與圖像之間的無限可能。</p>
</div>

<!-- GALLERY -->
<div class="gallery-wrap">
  <div class="gallery-count" id="galleryCount"></div>

  <div class="gallery-grid" id="galleryGrid">

    <!-- ★ 範例圖片區塊開始 — 之後新增圖片只要複製下面這個區塊 ★ -->

    <div class="gallery-item reveal" data-caption="益暢敏益生菌品牌封面">
      <img src="../dradvice01/image/dradvice01.png" alt="益暢敏益生菌品牌封面">
      <div class="gallery-overlay">
        <div class="gallery-caption">益暢敏益生菌品牌封面</div>
      </div>
      <div class="gallery-expand">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 1h4M1 1v4M13 1h-4M13 1v4M1 13h4M1 13v-4M13 13h-4M13 13v-4"/>
        </svg>
      </div>
    </div>

    <div class="gallery-item reveal" data-caption="本地 AI 商業圖片生成教材封面">
      <img src="../LocalAI_Image/image/LocalAI_Image.png" alt="本地 AI 圖像封面">
      <div class="gallery-overlay">
        <div class="gallery-caption">本地 AI 商業圖片生成教材封面</div>
      </div>
      <div class="gallery-expand">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 1h4M1 1v4M13 1h-4M13 1v4M1 13h4M1 13v-4M13 13h-4M13 13v-4"/>
        </svg>
      </div>
    </div>

    <div class="gallery-item reveal" data-caption="代碼烏托邦 — 開源故事封面">
      <img src="../opensource-story/image/opensource-story.png" alt="代碼烏托邦封面">
      <div class="gallery-overlay">
        <div class="gallery-caption">代碼烏托邦 — 開源故事封面</div>
      </div>
      <div class="gallery-expand">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 1h4M1 1v4M13 1h-4M13 1v4M1 13h4M1 13v-4M13 13h-4M13 13v-4"/>
        </svg>
      </div>
    </div>

    <div class="gallery-item reveal" data-caption="AI 宇宙指南封面">
      <img src="../ai-guide/image/ai-guide.png" alt="AI 宇宙指南封面">
      <div class="gallery-overlay">
        <div class="gallery-caption">AI 宇宙指南封面</div>
      </div>
      <div class="gallery-expand">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 1h4M1 1v4M13 1h-4M13 1v4M1 13h4M1 13v-4M13 13h-4M13 13v-4"/>
        </svg>
      </div>
    </div>

    <div class="gallery-item reveal" data-caption="用 Claude 做網站封面">
      <img src="../claude-web-guide/image/claude-web-guide.png" alt="Claude 網頁開發封面">
      <div class="gallery-overlay">
        <div class="gallery-caption">用 Claude 做網站封面</div>
      </div>
      <div class="gallery-expand">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 1h4M1 1v4M13 1h-4M13 1v4M1 13h4M1 13v-4M13 13h-4M13 13v-4"/>
        </svg>
      </div>
    </div>

    <!-- ★ 範例圖片區塊結束 — 新增圖片從這裡往下加 ★ -->

  </div>

  <div class="empty-state" id="emptyState">
    <div style="font-size:2rem;">🖼</div>
    <p>這個分類還沒有圖片</p>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <div class="lightbox-info">
      <span class="lightbox-caption" id="lightboxCaption"></span>
    </div>
  </div>
  <button class="lightbox-close" id="lightboxClose">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M2 2l12 12M14 2L2 14"/>
    </svg>
  </button>
  <button class="lightbox-prev" id="lightboxPrev">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M10 4l-4 4 4 4"/>
    </svg>
  </button>
  <button class="lightbox-next" id="lightboxNext">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M6 4l4 4-4 4"/>
    </svg>
  </button>
</div>

<!-- FOOTER -->
<footer>
  <a href="../" class="footer-logo">Kai<span>.</span></a>
  <div class="footer-note">AI Creative Gallery · Built with HTML5</div>
</footer>

<script>
  // ── LIGHTBOX ──
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxCaption = document.getElementById('lightboxCaption');
  let currentIndex = 0;
  let allItems = [];

  function getItems() {
    return Array.from(document.querySelectorAll('.gallery-item'));
  }

  function openLightbox(item) {
    allItems = getItems();
    currentIndex = allItems.indexOf(item);
    showLightboxItem(currentIndex);
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showLightboxItem(index) {
    const item = allItems[index];
    if (!item) return;
    const img = item.querySelector('img');
    lightboxImg.src = img.src;
    lightboxImg.alt = img.alt;
    lightboxCaption.textContent = item.dataset.caption || '';
    currentIndex = index;
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  // Init
  allItems = getItems();
  document.getElementById('galleryCount').textContent = `共 ${allItems.length} 張`;

  allItems.forEach(item => {
    item.addEventListener('click', () => openLightbox(item));
  });

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);

  document.getElementById('lightboxPrev').addEventListener('click', e => {
    e.stopPropagation();
    showLightboxItem((currentIndex - 1 + allItems.length) % allItems.length);
  });

  document.getElementById('lightboxNext').addEventListener('click', e => {
    e.stopPropagation();
    showLightboxItem((currentIndex + 1) % allItems.length);
  });

  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showLightboxItem((currentIndex - 1 + allItems.length) % allItems.length);
    if (e.key === 'ArrowRight') showLightboxItem((currentIndex + 1) % allItems.length);
  });

  // ── SCROLL REVEAL ──
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver(entries => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 60);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05 });
  reveals.forEach(el => observer.observe(el));
</script>
</body>
</html>
