<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語音合成工作室 · Web TTS Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eeebff;
      --accent: #10b981;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --card-bg: rgba(255, 255, 255, 0.9);
      --radius: 16px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', 'Noto Sans TC', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-main);
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      width: 100%;
      max-width: 600px;
      border-radius: var(--radius);
      padding: 40px 30px;
      box-shadow: var(--shadow);
    }

    .header { text-align: center; margin-bottom: 32px; }
    .header h2 {
      font-size: 1.8rem; font-weight: 700; color: var(--primary);
      display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px;
    }
    .header p { font-size: 0.9rem; color: var(--text-muted); }

    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 0.95rem; font-weight: 500; margin-bottom: 8px; }
    
    /* 調整滑桿的排版 */
    .slider-container {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(243, 244, 246, 0.6);
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }
    .slider-container input[type="range"] {
      flex: 1;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .slider-val {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--primary);
      min-width: 45px;
      text-align: right;
    }

    textarea, select {
      width: 100%; padding: 14px; border: 2px solid #e5e7eb; border-radius: 12px;
      font-family: inherit; font-size: 1rem; outline: none; transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.7);
    }
    textarea { height: 100px; resize: vertical; }
    textarea:focus, select:focus { border-color: var(--primary); background: #fff; }

    button {
      width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary);
      color: white; font-family: inherit; font-size: 1.05rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    button:hover { background: var(--primary-hover); transform: translateY(-1px); }
    button:disabled { background: #9ca3af; box-shadow: none; cursor: not-allowed; }

    .spinner {
      width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .player-card {
      margin-top: 32px; background: #f9fafb; border: 1px solid #f3f4f6; border-radius: 12px;
      padding: 20px; display: none; animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.85rem; color: var(--text-muted); }
    .status-badge { background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; }
    audio { width: 100%; margin-top: 8px; }

    .audio-wave { display: flex; align-items: center; gap: 3px; height: 20px; }
    .audio-wave span { display: block; width: 3px; height: 5px; background: var(--primary); border-radius: 2px; }
    .playing .audio-wave span { animation: wave 1.2s ease-in-out infinite; }
    .playing .audio-wave span:nth-child(2) { animation-delay: 0.2s; }
    .playing .audio-wave span:nth-child(3) { animation-delay: 0.4s; }
    .playing .audio-wave span:nth-child(4) { animation-delay: 0.6s; }
    .playing .audio-wave span:nth-child(5) { animation-delay: 0.8s; }
    @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 20px; } }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h2><span>🔊</span> 語音合成工作室</h2>
      <p>客製化語速與語調控制面板</p>
    </div>

    <div class="form-group">
      <label for="text">預計合成文字</label>
      <textarea id="text" placeholder="請輸入需要轉成語音的教材、鼓勵語句或字詞..."></textarea>
    </div>
    
    <div class="form-group">
      <label for="voice">選擇配音師</label>
      <select id="voice">
        <option value="zh-TW-HsiaoYuNeural">曉雨 (溫源女聲 - 推薦教學)</option>
        <option value="zh-TW-YunXiNeural">雲希 (陽光男聲)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="rate">語速調整 (Speed)</label>
      <div class="slider-container">
        <input type="range" id="rate" min="-50" max="50" value="0" oninput="document.getElementById('rateVal').innerText = (this.value >= 0 ? '+' : '') + this.value + '%'">
        <span class="slider-val" id="rateVal">0%</span>
      </div>
    </div>

    <div class="form-group">
      <label for="pitch">語調/音高 (Pitch)</label>
      <div class="slider-container">
        <input type="range" id="pitch" min="-50" max="50" value="0" oninput="document.getElementById('pitchVal').innerText = (this.value >= 0 ? '+' : '') + this.value + '%'">
        <span class="slider-val" id="pitchVal">0%</span>
      </div>
    </div>
    
    <button id="submitBtn" onclick="generateSpeech()">
      <div class="spinner" id="btnSpinner"></div>
      <span id="btnText">開始合成高品質語音</span>
    </button>

    <div class="player-card" id="playerCard">
      <div class="player-header">
        <div class="audio-wave" id="waveContainer">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <span class="status-badge">✓ 合成成功</span>
      </div>
      <audio id="audioPlayer" controls></audio>
    </div>
  </div>

  <script>
    async function generateSpeech() {
      const text = document.getElementById('text').value.trim();
      const voice = document.getElementById('voice').value;
      const rateVal = document.getElementById('rate').value;
      const pitchVal = document.getElementById('pitch').value;
      
      if (!text) return alert('請輸入文字內容！');

      // 轉換為後端需要的格式，如 "+10%" 或 "-5%"
      const rate = (rateVal >= 0 ? '+' : '') + rateVal + '%';
      const pitch = (pitchVal >= 0 ? '+' : '') + pitchVal + '%';

      const submitBtn = document.getElementById('submitBtn');
      const btnSpinner = document.getElementById('btnSpinner');
      const btnText = document.getElementById('btnText');
      const playerCard = document.getElementById('playerCard');
      const waveContainer = document.getElementById('waveContainer');

      submitBtn.disabled = true;
      btnSpinner.style.display = 'block';
      btnText.textContent = '語音模型計算中...';

      try {
        const response = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, voice, rate, pitch })
        });

        if (!response.ok) throw new Error('伺服器語音合成失敗');

        const blob = await response.blob();
        const audioUrl = URL.createObjectURL(blob);
        
        const player = document.getElementById('audioPlayer');
        player.src = audioUrl;
        
        playerCard.style.display = 'block';
        player.onplay = () => waveContainer.classList.add('playing');
        player.onpause = () => waveContainer.classList.remove('playing');
        player.onended = () => waveContainer.classList.remove('playing');
        
        player.play();
      } catch (err) {
        alert('發生錯誤: ' + err.message);
      } finally {
        submitBtn.disabled = false;
        btnSpinner.style.display = 'none';
        btnText.textContent = '開始合成高品質語音';
      }
    }
  </script>
</body>
</html>
