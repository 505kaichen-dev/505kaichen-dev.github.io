<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>看圖找聲音｜注音樂園</title>
  <style>
    :root{--primary:#FF6B35;--secondary:#4ECDC4;--ink:#292B3D;--muted:#73788f;--bg:#FFF9F0;--card:#fff;--soft:#EEF1FF;--ok:#31b982;--no:#ef6262;--radius:24px;--shadow:0 8px 28px rgba(52,45,80,.1)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{touch-action:manipulation}body{min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;display:flex;flex-direction:column;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}button,a{font:inherit}button{touch-action:manipulation}
    header{min-height:64px;padding:12px 22px;background:var(--primary);color:#fff;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;box-shadow:0 4px 16px rgba(255,107,53,.24)}.back{color:#fff;text-decoration:none;font-weight:800;justify-self:start}.title{font-size:1.35rem;font-weight:900;letter-spacing:2px;text-align:center}.fullscreen{justify-self:end;width:42px;height:42px;border:2px solid rgba(255,255,255,.55);border-radius:50%;background:transparent;color:#fff;font-size:1.2rem;cursor:pointer}
    main{width:min(1060px,100%);margin:auto;padding:24px;flex:1;display:flex}.screen{display:none;width:100%}.screen.active{display:flex;flex-direction:column}
    #menu-screen{justify-content:center;gap:18px}.intro{text-align:center}.intro-icon{font-size:4rem;line-height:1.1}.intro h1{font-size:clamp(1.65rem,4vw,2.35rem);margin:8px 0}.intro p{color:var(--muted);font-weight:700}.help-btn{margin-top:10px;width:58px;height:58px;border:0;border-radius:50%;background:var(--secondary);color:#fff;font-size:1.65rem;cursor:pointer;box-shadow:0 5px 0 #319f98}
    .mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.mode-card{border:3px solid transparent;border-radius:var(--radius);background:#fff;padding:20px;text-align:left;cursor:pointer;box-shadow:var(--shadow);color:var(--ink)}.mode-card.selected{border-color:var(--primary);background:#fff7f2}.mode-icon{font-size:2.2rem}.mode-card h2{margin:5px 0;font-size:1.2rem}.mode-card p{color:var(--muted);font-size:.88rem;line-height:1.5}
    .level-panel{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.level-panel h2{text-align:center;font-size:1rem;margin-bottom:12px}.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.level-btn{min-height:82px;border:2px solid #dfe3f3;border-radius:16px;background:#fff;color:var(--ink);cursor:pointer;padding:7px}.level-number{display:block;font-size:1.15rem;font-weight:900}.level-stars{display:block;color:#F4A900;font-size:.82rem;letter-spacing:1px;margin-top:4px}.level-note{display:block;color:var(--muted);font-size:.68rem;margin-top:4px;font-weight:700}.level-btn.selected{color:#fff;background:var(--secondary);border-color:var(--secondary)}.level-btn.selected .level-stars,.level-btn.selected .level-note{color:#fff}
    .menu-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}.start-btn{min-width:210px;min-height:54px;border:0;border-radius:30px;background:var(--primary);color:#fff;font-size:1.15rem;font-weight:900;box-shadow:0 7px 0 #d94e1c;cursor:pointer}.switch-game{min-height:54px;padding:0 20px;border:2px solid #dfe3f3;border-radius:30px;background:#fff;color:var(--ink);font-weight:900;text-decoration:none;display:flex;align-items:center}
    #game-screen{gap:14px}.status-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}.round,.score{font-weight:900;color:var(--muted)}.score{justify-self:end}.hearts{font-size:1.25rem;letter-spacing:3px;text-align:center}.timer-wrap{height:10px;border-radius:10px;background:#e7e8ef;overflow:hidden}.timer-bar{height:100%;width:100%;background:var(--secondary);transition:width .1s linear}
    .question-card{flex:1;min-height:260px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px}.picture{font-size:5.2rem;line-height:1.15}.word{font-size:1.7rem;font-weight:900}.word-listen{width:70px;height:70px;border:0;border-radius:50%;background:var(--secondary);color:#fff;font-size:1.8rem;box-shadow:0 5px 0 #319f98;cursor:pointer}.feedback{min-height:28px;font-size:1.1rem;font-weight:900}.feedback.correct{color:var(--ok)}.feedback.wrong{color:var(--no)}
    .choices{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.choice{min-height:96px;border:3px solid #dfe3f3;border-radius:20px;background:#fff;color:var(--ink);font-size:2.3rem;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #dfe3f3}.choice.correct{background:#e1f8ef;border-color:var(--ok);color:#14845b}.choice.wrong{background:#fff0f0;border-color:var(--no);color:#c43d3d}.choice:disabled{cursor:default}.game-actions{display:flex;justify-content:space-between}.small-btn{border:0;background:transparent;color:var(--muted);font-weight:800;padding:10px;cursor:pointer}
    #result-screen{justify-content:center;align-items:center;text-align:center}.result-card{width:min(520px,100%);background:#fff;border-radius:var(--radius);padding:32px 24px;box-shadow:var(--shadow)}.result-emoji{font-size:4.5rem}.result-card h1{font-size:2rem;margin:8px}.result-score{color:var(--primary);font-size:2.5rem;font-weight:900;margin:12px}.result-detail{color:var(--muted);font-weight:700;line-height:1.8}.result-actions{margin-top:20px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}.result-actions button{min-height:48px;padding:0 22px;border-radius:25px;font-weight:900;cursor:pointer}.again{border:0;background:var(--primary);color:#fff}.to-menu{border:2px solid #dfe3f3;background:#fff;color:var(--ink)}
    @media(orientation:landscape) and (min-width:700px) and (max-height:850px){main{padding:14px 24px}#game-screen{display:none;grid-template-columns:minmax(260px,.9fr) minmax(420px,1.5fr);grid-template-rows:auto 10px 1fr auto}#game-screen.active{display:grid}.status-row,.timer-wrap,.game-actions{grid-column:1/-1}.question-card{grid-column:1;min-height:0}.choices{grid-column:2;align-self:stretch;grid-template-columns:repeat(2,1fr)}.choice{min-height:72px}.picture{font-size:4.5rem}}
    @media(max-width:640px){header{padding:10px 14px}.title{font-size:1.05rem;letter-spacing:1px}.back{font-size:.85rem}.fullscreen{width:38px;height:38px}main{padding:14px}.mode-grid{grid-template-columns:1fr}.mode-card{padding:15px}.level-grid{grid-template-columns:repeat(2,1fr)}.level-btn:last-child{grid-column:1/-1}.choices{grid-template-columns:repeat(2,1fr);gap:10px}.choice{min-height:80px;font-size:2rem}.question-card{min-height:220px}.picture{font-size:4.5rem}}
  </style>
</head>
<body>
  <header><a href="index.html" class="back">← 遊戲區</a><div class="title">🖼️ 看圖找聲音</div><button class="fullscreen" id="fullscreen-btn" aria-label="切換全螢幕">⛶</button></header>
  <main>
    <section class="screen active" id="menu-screen">
      <div class="intro"><div class="intro-icon">🖼️👂</div><h1>看圖、聽詞語、找聲音</h1><p>哪一個注音，是詞語開頭的聲音？</p><button class="help-btn" id="help-btn" aria-label="播放遊戲說明">🔊</button></div>
      <div class="mode-grid">
        <button class="mode-card selected" data-mode="practice"><div class="mode-icon">🌱</div><h2>練習模式</h2><p>不限時間，答錯可以再試一次。</p></button>
        <button class="mode-card" data-mode="challenge"><div class="mode-icon">🏆</div><h2>挑戰模式</h2><p>每題 12 秒，答錯會少一顆愛心。</p></button>
      </div>
      <div class="level-panel"><h2>選擇難度</h2><div class="level-grid" id="level-grid"></div></div>
      <div class="menu-actions"><button class="start-btn" id="start-btn">開始遊戲 ▶</button><a class="switch-game" href="listen.html">🎧 聽音找符號</a></div>
    </section>
    <section class="screen" id="game-screen">
      <div class="status-row"><div class="round" id="round-label"></div><div class="hearts" id="hearts"></div><div class="score" id="score-label"></div></div>
      <div class="timer-wrap" id="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>
      <div class="question-card"><div class="picture" id="picture"></div><div class="word" id="word"></div><button class="word-listen" id="word-listen" aria-label="播放詞語">🔊</button><div class="feedback" id="feedback"></div></div>
      <div class="choices" id="choices"></div>
      <div class="game-actions"><button class="small-btn" id="quit-btn">✕ 結束</button><span></span></div>
    </section>
    <section class="screen" id="result-screen"><div class="result-card"><div class="result-emoji" id="result-emoji"></div><h1 id="result-title"></h1><div class="result-score" id="result-score"></div><div class="result-detail" id="result-detail"></div><div class="result-actions"><button class="again" id="again-btn">↻ 再玩一次</button><button class="to-menu" id="menu-btn">123 選難度</button></div></div></section>
  </main>
  <script>
    const ITEMS=[
      {char:'ㄅ',emoji:'🎒',word:'背包',file:'01_beibao'},{char:'ㄆ',emoji:'🫧',word:'泡泡',file:'02_paopao'},
      {char:'ㄇ',emoji:'🐴',word:'馬',file:'03_ma'},{char:'ㄈ',emoji:'✈️',word:'飛機',file:'04_feiji'},
      {char:'ㄉ',emoji:'🥚',word:'蛋',file:'05_dan'},{char:'ㄊ',emoji:'🐰',word:'兔子',file:'06_tuzi'},
      {char:'ㄋ',emoji:'🐦',word:'鳥',file:'07_niao'},{char:'ㄌ',emoji:'🦁',word:'老虎',file:'08_laohu'},
      {char:'ㄍ',emoji:'🐶',word:'狗',file:'09_gou'},{char:'ㄎ',emoji:'👄',word:'口',file:'10_kou'},
      {char:'ㄏ',emoji:'🌺',word:'花',file:'11_hua'},{char:'ㄐ',emoji:'🐔',word:'雞',file:'12_ji'},
      {char:'ㄑ',emoji:'⚽',word:'球',file:'13_qiu'},{char:'ㄒ',emoji:'🍉',word:'西瓜',file:'14_xigua'},
      {char:'ㄓ',emoji:'🐷',word:'豬',file:'15_zhu'},{char:'ㄔ',emoji:'🚗',word:'車',file:'16_che'},
      {char:'ㄕ',emoji:'🐍',word:'蛇',file:'17_she'},{char:'ㄖ',emoji:'🥩',word:'肉',file:'18_rou'},
      {char:'ㄗ',emoji:'🟣',word:'紫色',file:'19_zise'},{char:'ㄘ',emoji:'🌿',word:'草',file:'20_cao'},
      {char:'ㄙ',emoji:'🧹',word:'掃地',file:'21_saodi'}
    ];
    const CHARS=ITEMS.map(item=>item.char);
    const GROUPS=[['ㄅ','ㄆ','ㄇ','ㄈ'],['ㄉ','ㄊ','ㄋ','ㄌ'],['ㄍ','ㄎ','ㄏ'],['ㄐ','ㄑ','ㄒ'],['ㄓ','ㄔ','ㄕ','ㄖ'],['ㄗ','ㄘ','ㄙ']];
    const LEVELS=[
      {pool:ITEMS.slice(0,8),choices:3,note:'8 個聲母・3 選 1'},
      {pool:ITEMS.slice(0,14),choices:3,note:'14 個聲母・3 選 1'},
      {pool:ITEMS,choices:4,note:'全部聲母・4 選 1'},
      {pool:ITEMS,choices:4,note:'相近音・4 選 1',confusing:true},
      {pool:ITEMS,choices:6,note:'全部聲母・6 選 1'}
    ];
    let mode='practice',levelIndex=0,question=0,correctCount=0,score=0,streak=0,bestStreak=0,lives=3,current=null,lastChar='',locked=false,timerId=null,timeLeft=12,wordAudio=null,sfxAudio=null,guideAudio=null;
    const screens=[...document.querySelectorAll('.screen')],levelGrid=document.getElementById('level-grid'),choicesEl=document.getElementById('choices'),feedbackEl=document.getElementById('feedback');
    function showScreen(id){screens.forEach(screen=>screen.classList.toggle('active',screen.id===id))}
    function shuffle(list){const a=[...list];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
    function renderLevels(){levelGrid.innerHTML='';LEVELS.forEach((level,index)=>{const b=document.createElement('button');b.className=`level-btn${index===levelIndex?' selected':''}`;b.innerHTML=`<span class="level-number">${index===levelIndex?'● ':''}${index+1}</span><span class="level-stars">${'★'.repeat(index+1)}${'☆'.repeat(4-index)}</span><span class="level-note">${level.note}</span>`;b.onclick=()=>{levelIndex=index;renderLevels()};levelGrid.appendChild(b)})}
    function stopAudio(){[wordAudio,sfxAudio,guideAudio].forEach(audio=>{if(audio){audio.pause();audio.currentTime=0}});window.speechSynthesis?.cancel()}
    function playWord(){if(!current)return;if(wordAudio){wordAudio.pause();wordAudio.currentTime=0}window.speechSynthesis?.cancel();wordAudio=new Audio(`../audio/game/words/${current.file}.mp3`);wordAudio.onerror=()=>speakFallback(current.word);wordAudio.play().catch(()=>{})}
    function speakFallback(text){if(!window.speechSynthesis)return;const utterance=new SpeechSynthesisUtterance(text);utterance.lang='zh-TW';utterance.rate=.72;speechSynthesis.speak(utterance)}
    function playSfx(kind){if(sfxAudio){sfxAudio.pause();sfxAudio.currentTime=0}const file=kind==='skip'?'skip.wav':`${kind}_${Math.floor(Math.random()*3)+1}.wav`;sfxAudio=new Audio(`../audio/sfx/${file}`);sfxAudio.play().catch(()=>{})}
    function playGuide(name){if(guideAudio){guideAudio.pause();guideAudio.currentTime=0}guideAudio=new Audio(`../audio/game/${name}.mp3`);guideAudio.play().catch(()=>{})}
    function startGame(){question=0;correctCount=0;score=0;streak=0;bestStreak=0;lives=3;lastChar='';showScreen('game-screen');nextQuestion()}
    function nextQuestion(){clearTimer();stopAudio();if(question>=10||(mode==='challenge'&&lives<=0))return finishGame();question++;locked=false;feedbackEl.textContent='';feedbackEl.className='feedback';const level=LEVELS[levelIndex],pool=level.pool.filter(item=>item.char!==lastChar);current=pool[Math.floor(Math.random()*pool.length)]||level.pool[0];lastChar=current.char;document.getElementById('picture').textContent=current.emoji;document.getElementById('word').textContent=current.word;renderChoices(makeChoices(level));updateStatus();setTimeout(playWord,220);if(mode==='challenge')startTimer()}
    function makeChoices(level){let chars=level.pool.map(item=>item.char).filter(char=>char!==current.char);if(level.confusing){const group=GROUPS.find(g=>g.includes(current.char))||[];const close=group.filter(char=>char!==current.char);chars=[...close,...shuffle(chars.filter(char=>!close.includes(char)))]}else chars=shuffle(chars);return shuffle([current.char,...chars.slice(0,level.choices-1)])}
    function renderChoices(chars){choicesEl.innerHTML='';chars.forEach(char=>{const b=document.createElement('button');b.className='choice';b.textContent=char;b.dataset.char=char;b.onclick=()=>checkAnswer(b,char);choicesEl.appendChild(b)})}
    function checkAnswer(button,char){if(locked)return;if(char===current.char){locked=true;clearTimer();button.classList.add('correct');correctCount++;streak++;bestStreak=Math.max(bestStreak,streak);score+=mode==='challenge'?100+Math.min(streak-1,5)*20:100;feedbackEl.textContent=streak>=3?`連續 ${streak} 題 ✨`:'答對了！';feedbackEl.className='feedback correct';playSfx('correct');disableChoices();updateStatus();setTimeout(nextQuestion,mode==='practice'?850:720)}else{button.classList.add('wrong');button.disabled=true;streak=0;feedbackEl.textContent=mode==='practice'?'再聽一次':'再試一次！';feedbackEl.className='feedback wrong';playSfx('wrong');if(mode==='challenge'){locked=true;clearTimer();lives--;revealAnswer();updateStatus();setTimeout(lives<=0?finishGame:nextQuestion,900)}else setTimeout(playWord,320)}}
    function disableChoices(){choicesEl.querySelectorAll('button').forEach(b=>b.disabled=true)}
    function revealAnswer(){const b=choicesEl.querySelector(`[data-char="${current.char}"]`);if(b)b.classList.add('correct');disableChoices()}
    function updateStatus(){document.getElementById('round-label').textContent=`${question} / 10`;document.getElementById('score-label').textContent=`${score} 分`;document.getElementById('hearts').textContent=mode==='challenge'?'❤️'.repeat(Math.max(0,lives))+'🤍'.repeat(Math.max(0,3-lives)):'∞';document.getElementById('timer-wrap').style.visibility=mode==='challenge'?'visible':'hidden'}
    function startTimer(){timeLeft=12;updateTimer();timerId=setInterval(()=>{timeLeft-=.1;updateTimer();if(timeLeft<=0)handleTimeout()},100)}
    function updateTimer(){const p=Math.max(0,timeLeft/12*100),bar=document.getElementById('timer-bar');bar.style.width=`${p}%`;bar.style.background=p<30?'var(--no)':'var(--secondary)'}
    function clearTimer(){if(timerId)clearInterval(timerId);timerId=null}
    function handleTimeout(){if(locked)return;locked=true;clearTimer();lives--;streak=0;feedbackEl.textContent=`答案是 ${current.char}`;feedbackEl.className='feedback wrong';playSfx('skip');revealAnswer();updateStatus();setTimeout(lives<=0?finishGame:nextQuestion,1000)}
    function finishGame(){clearTimer();stopAudio();const rate=correctCount/Math.max(1,question);document.getElementById('result-emoji').textContent=rate>=.8?'🎉':rate>=.5?'🌟':'🌱';document.getElementById('result-title').textContent=rate>=.8?'太厲害了！':rate>=.5?'進步很多喔！':'再練習一次吧！';document.getElementById('result-score').textContent=mode==='challenge'?`${score} 分`:`${correctCount} / ${question}`;document.getElementById('result-detail').innerHTML=`答對 ${correctCount} 題<br>最高連續答對 ${bestStreak} 題<br>難度 ${levelIndex+1}・${mode==='practice'?'練習模式':'挑戰模式'}`;showScreen('result-screen')}
    document.querySelectorAll('.mode-card').forEach(card=>card.onclick=()=>{mode=card.dataset.mode;document.querySelectorAll('.mode-card').forEach(item=>item.classList.toggle('selected',item===card));playGuide(mode==='practice'?'mode_practice':'mode_challenge')});
    document.getElementById('help-btn').onclick=()=>playGuide('how_to_play_picture');document.getElementById('start-btn').onclick=startGame;document.getElementById('word-listen').onclick=playWord;document.getElementById('quit-btn').onclick=finishGame;document.getElementById('again-btn').onclick=startGame;document.getElementById('menu-btn').onclick=()=>showScreen('menu-screen');document.getElementById('fullscreen-btn').onclick=async()=>{try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(_){}};
    document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault()},{passive:false});renderLevels();
  </script>
</body>
</html>
