<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>注音樂園 · 符號教學</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF9F0;
      --primary: #FF6B35;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --ink: #2C2C2C;
      --card: #FFFFFF;
      --soft: #F0F4FF;
      --radius: 20px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Nunito', 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--primary);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(255,107,53,0.25);
    }
    .header-back { text-decoration:none; color:#fff; font-weight:700; font-size:1rem; opacity:0.9; }
    .header-back:hover { opacity:1; }
    .header-title { font-size:1.4rem; font-weight:900; letter-spacing:3px; }
    .header-chart {
      text-decoration:none; color:#fff; font-size:0.85rem; font-weight:700;
      opacity:0.8; border:2px solid rgba(255,255,255,0.5);
      border-radius:20px; padding:4px 12px;
    }

    /* ===== 符號快速列 ===== */
    .symbol-bar {
      background: var(--soft);
      padding: 10px 16px;
      overflow-x: scroll;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      display: flex;
      gap: 6px;
      align-items: center;
      border-bottom: 2px solid #e0e4f0;
      position: sticky;
      top: 57px;
      z-index: 90;
      cursor: grab;
    }
    .symbol-bar::-webkit-scrollbar { display: none; }
    .symbol-bar.grabbing { cursor: grabbing; }
    .bar-group { display: flex; gap: 5px; flex-shrink: 0; }
    .bar-group + .bar-group { margin-left:6px; padding-left:6px; border-left:2px dashed #c8cce0; }
    .bar-chip {
      width:36px; height:36px; border-radius:50%;
      background:var(--card); border:2px solid #d0d4e8;
      display:flex; align-items:center; justify-content:center;
      font-size:0.95rem; font-weight:900; cursor:pointer;
      transition:all .15s; flex-shrink:0; color:var(--ink);
    }
    .bar-chip:hover { border-color:var(--primary); transform:scale(1.15); }
    .bar-chip.active {
      background:var(--primary); color:#fff; border-color:var(--primary);
      transform:scale(1.2); box-shadow:0 4px 12px rgba(255,107,53,0.35);
    }

    /* ===== 主容器 ===== */
    main { flex:1; max-width:900px; margin:0 auto; padding:20px 16px 60px; width:100%; }

    /* ===== 符號資訊列 ===== */
    .symbol-info { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
    .symbol-display {
      font-size:5rem; font-weight:900; color:var(--primary);
      line-height:1; animation:popIn .3s ease;
    }
    @keyframes popIn {
      0% { transform:scale(0.7); opacity:0; }
      70% { transform:scale(1.1); }
      100% { transform:scale(1); opacity:1; }
    }
    .symbol-meta { display:flex; flex-direction:column; gap:6px; }
    .symbol-type-badge {
      display:inline-block; padding:3px 12px; border-radius:50px;
      font-size:0.8rem; font-weight:700; background:var(--accent); color:var(--ink);
    }
    .symbol-stroke-info { font-size:0.9rem; color:#888; font-weight:700; }
    .speak-btn {
      background:var(--secondary); border:none; border-radius:50px;
      padding:10px 24px; font-family:inherit; font-size:1rem;
      font-weight:700; cursor:pointer; color:#fff; transition:transform .15s;
    }
    .speak-btn:hover { transform:scale(1.05); }
    .symbol-nav { margin-left:auto; display:flex; gap:8px; }
    .nav-btn {
      padding:8px 16px; border-radius:var(--radius-sm);
      border:2px solid #d0d4e8; background:var(--card);
      font-family:inherit; font-size:0.9rem; font-weight:700;
      cursor:pointer; transition:all .15s; color:var(--ink);
    }
    .nav-btn:hover { border-color:var(--primary); color:var(--primary); }

    /* ===== 主學習區 ===== */
    .learn-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:20px; margin-bottom:24px;
    }
    .learn-card {
      background:var(--card); border-radius:var(--radius);
      padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.07);
      display:flex; flex-direction:column; align-items:center; gap:12px;
    }
    .card-title {
      font-size:0.85rem; font-weight:700; color:#888;
      letter-spacing:0.05em; align-self:flex-start;
    }

    /* Tab 切換 */
    .tab-row { display:flex; gap:8px; width:100%; }
    .tab-btn {
      flex:1; padding:7px; border-radius:var(--radius-sm);
      font-family:inherit; font-size:0.85rem; font-weight:700;
      cursor:pointer; transition:all .15s; border:2px solid #d0d4e8;
      background:#fff; color:var(--ink);
    }
    .tab-btn.active {
      background:var(--primary); color:#fff; border-color:var(--primary);
    }

    /* Hanzi Writer 容器 */
    .hw-wrap {
      width:100%; aspect-ratio:1;
      background:#f8f8f8;
      border:2px solid #e6e6e6;
      border-radius:var(--radius-sm);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
      position:relative;
    }

    /* ===== AnimCJK SVG 筆順 / 描字 ===== */
    .animcjk-board { position:relative; touch-action:none; }
    .animcjk-board::before, .animcjk-board::after {
      content:""; position:absolute; pointer-events:none; z-index:0;
    }
    .animcjk-board::before {
      top:0; bottom:0; left:50%;
      border-left:2px dashed #d8d8d8;
      transform:translateX(-1px);
    }
    .animcjk-board::after {
      left:0; right:0; top:50%;
      border-top:2px dashed #d8d8d8;
      transform:translateY(-1px);
    }
    .animcjk-target { width:88%; height:88%; position:relative; z-index:1; }
    .animcjk-target svg { width:100%; height:100%; display:block; overflow:visible; }
    .animcjk-outline { fill:#d8d0c8; opacity:.82; }
    .animcjk-sweep {
      fill:none; stroke:var(--primary); stroke-width:128; stroke-linecap:round; stroke-linejoin:round;
      stroke-dasharray:3333; stroke-dashoffset:3333;
    }
    .practice-sweep { stroke:var(--secondary); opacity:.95; }
    .practice-user-path { fill:none; stroke:var(--secondary); stroke-width:34; stroke-linecap:round; stroke-linejoin:round; opacity:.78; }
    .practice-guide-path { fill:none; stroke:transparent; stroke-width:42; stroke-linecap:round; stroke-linejoin:round; opacity:0; pointer-events:none; }
    .animcjk-progress { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; min-height:24px; }
    .stroke-dot {
      min-width:24px; height:24px; padding:0 7px; border-radius:999px; display:flex; align-items:center; justify-content:center;
      font-size:.75rem; font-weight:900; border:2px solid #d0d4e8; color:#888; background:#fff;
    }
    .stroke-dot.done { background:var(--secondary); border-color:var(--secondary); color:#fff; }
    .stroke-dot.active { background:var(--primary); border-color:var(--primary); color:#fff; }


    /* 靜態圖 */
    .static-wrap {
      width:100%; aspect-ratio:1;
      background:#f8f8f8; border-radius:var(--radius-sm);
      display:none; align-items:center; justify-content:center;
    }
    .static-wrap img {
      width:85%; height:85%; object-fit:contain;
    }

    /* 描字結果 */
    .quiz-result {
      font-size:0.9rem; font-weight:700;
      padding:6px 16px; border-radius:50px;
      min-height:30px; text-align:center; width:100%;
    }
    .quiz-result.ok { background:#E8FAF9; color:#0f6e56; }
    .quiz-result.no { background:#FFF5E0; color:#b45309; }

    .reset-btn {
      padding:8px 24px; border-radius:50px;
      border:2px solid #d0d4e8; background:var(--card);
      font-family:inherit; font-size:0.9rem; font-weight:700;
      cursor:pointer; color:var(--ink); transition:all .15s;
    }
    .reset-btn:hover { border-color:var(--secondary); color:var(--secondary); }

    /* ===== 例字區 ===== */
    .examples-card {
      background:var(--card); border-radius:var(--radius);
      padding:22px; box-shadow:0 4px 20px rgba(0,0,0,0.07);
    }
    .examples-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:12px; margin-top:12px;
    }
    .example-item {
      background:var(--soft); border-radius:var(--radius-sm);
      min-height:168px; padding:18px 12px; text-align:center; cursor:pointer;
      display:flex; flex-direction:column; justify-content:center;
      transition:transform .15s; border:2px solid transparent;
    }
    .example-item:hover { transform:translateY(-3px); border-color:var(--secondary); }
    .ex-emoji { font-size:2.35rem; display:block; margin-bottom:10px; line-height:1; }
    .ex-word {
      display:flex; justify-content:center; align-items:center;
      gap:0.7rem; min-height:4.9rem;
    }
    .zhuyin-pair {
      display:inline-flex; align-items:center; gap:0.24rem;
      font-weight:900;
    }
    .zhuyin-hanzi { font-size:2.05rem; line-height:1; }
    .zhuyin-reading {
      position:relative; display:flex;
      align-items:center; min-width:1.62rem; height:4rem;
      color:#39456c; font-size:1rem; font-weight:900; line-height:1;
    }
    .zhuyin-symbols {
      position:relative; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:0.08rem; white-space:nowrap;
    }
    .zhuyin-symbol { display:block; width:1rem; text-align:center; }
    .zhuyin-tone {
      position:absolute; left:1.02rem; bottom:0;
      color:#39456c; line-height:1;
    }
    .zhuyin-neutral {
      position:absolute; top:-0.82rem; left:0;
      font-size:1.08rem; line-height:0.78rem;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align:center; padding:20px; color:#aaa;
      font-size:0.8rem; border-top:1px solid #e8e8e8;
    }


    /* ===== 響應式 ===== */
    @media (max-width:640px) {
      .learn-grid { grid-template-columns:1fr; }
      .symbol-display { font-size:3.5rem; }
      .symbol-nav { display:none; }
      .examples-grid { grid-template-columns:1fr; }
      .example-item {
        min-height:112px; display:grid; grid-template-columns:3.5rem 1fr;
        align-items:center; padding:12px 18px;
      }
      .ex-emoji { margin:0; }
    }
  </style>
</head>

      <div class="hw-wrap animcjk-board" id="practice-board">

    </div>

  <!-- 例字區 -->

    <div class="examples-grid" id="examples-grid"></div>
  </div>
</main>

  { char:'ㄟ', type:'韻母', strokes:1, img:'27.png', examples:[{e:'✈️',w:'飛機',n:'ㄈㄟ ㄐㄧ'},{e:'😄',w:'美',n:'ㄇㄟˇ'},{e:'🌹',w:'玫瑰',n:'ㄇㄟˊ ㄍㄨㄟ'}] },
  { char:'ㄠ', type:'韻母', strokes:3, img:'28_1.png', examples:[{e:'🐱',w:'貓',n:'ㄇㄠ'},{e:'🌿',w:'草',n:'ㄘㄠˇ'},{e:'👶',w:'寶寶',n:'ㄅㄠˇ ㄅㄠˇ'}] },

  { char:'ㄤ', type:'韻母', strokes:3, img:'32_1.png', examples:[{e:'🐑',w:'羊',n:'ㄧㄤˊ'},{e:'🌞',w:'太陽',n:'ㄊㄞˋ ㄧㄤˊ'},{e:'🍬',w:'糖',n:'ㄊㄤˊ'}] },
  { char:'ㄥ', type:'韻母', strokes:1, img:'33.png', examples:[{e:'🐝',w:'嗡嗡',n:'ㄨㄥ ㄨㄥ'},{e:'🌈',w:'彩虹',n:'ㄘㄞˇ ㄏㄨㄥˊ'},{e:'🐉',w:'龍',n:'ㄌㄨㄥˊ'}] },
  { char:'ㄦ', type:'韻母', strokes:2, img:'34_1.png', examples:[{e:'👂',w:'耳朵',n:'ㄦˇ ㄉㄨㄛˇ'},{e:'👦',w:'兒子',n:'ㄦˊ ˙ㄗ'},{e:'➕',w:'而且',n:'ㄦˊ ㄑㄧㄝˇ'}] },
  { char:'ㄧ', type:'韻母', strokes:1, img:'35.png', examples:[{e:'1️⃣',w:'一',n:'ㄧ'},{e:'🪑',w:'椅子',n:'ㄧˇ ˙ㄗ'},{e:'🩺',w:'醫生',n:'ㄧ ㄕㄥ'}] },
  { char:'ㄨ', type:'韻母', strokes:2, img:'36_1.png', examples:[{e:'🐸',w:'青蛙',n:'ㄑㄧㄥ ㄨㄚ'},{e:'🐷',w:'豬',n:'ㄓㄨ'},{e:'🏡',w:'屋子',n:'ㄨ ˙ㄗ'}] },
  { char:'ㄩ', type:'韻母', strokes:2, img:'37_1.png', examples:[{e:'🐠',w:'魚',n:'ㄩˊ'},{e:'🌧️',w:'雨',n:'ㄩˇ'},{e:'🌕',w:'月亮',n:'ㄩㄝˋ ㄌㄧㄤˋ'}] },
];

const CONSONANTS = ALL_SYMBOLS.filter(s => s.type === '聲母');
const VOWELS     = ALL_SYMBOLS.filter(s => s.type === '韻母');
// ===== AnimCJK SVG 資料：從本地 SVG 載入 =====
const ANIMCJK_BASE = 'scripts/animcjk';
const SVG_NS = 'http://www.w3.org/2000/svg';
const XLINK_NS = 'http://www.w3.org/1999/xlink';

let currentSvgData = null;
let demoStep = 0;
let currentPractice = 0;
let drawing = false;
let drawPoints = [];
let animEls = [];
let practiceEls = null;

function symbolToSvgFile(char) {
  return `${char.codePointAt(0)}.svg`;
}

function fetchAnimCjkSvg(char) {
  const file = symbolToSvgFile(char);
  return fetch(`${ANIMCJK_BASE}/${file}`).then(r => {
    if (!r.ok) throw new Error(`找不到 AnimCJK SVG：${ANIMCJK_BASE}/${file}`);
    return r.text();
  }).then(text => parseAnimCjkSvg(text));
}

function parseAnimCjkSvg(text) {
  const doc = new DOMParser().parseFromString(text, 'image/svg+xml');
  const svg = doc.querySelector('svg');
  if (!svg) throw new Error('SVG 格式錯誤');
  const viewBox = svg.getAttribute('viewBox') || '0 0 1024 1024';
  const outlines = Array.from(svg.querySelectorAll('path[id]'))
    .filter(p => /d\d+$/.test(p.id))
    .sort((a, b) => {
      const na = parseInt(a.id.match(/d(\d+)$/)?.[1] || '0', 10);
      const nb = parseInt(b.id.match(/d(\d+)$/)?.[1] || '0', 10);
      return na - nb;
    })
    .map(p => p.getAttribute('d'));
  const sweeps = Array.from(svg.querySelectorAll('path[clip-path]'))
    .map(p => p.getAttribute('d'));
  if (!outlines.length || !sweeps.length) throw new Error('SVG 缺少筆畫資料');
  return { viewBox, outlines, sweeps };
}

function makeSvgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'href') el.setAttributeNS(XLINK_NS, 'href', v);
    else el.setAttribute(k, v);
  });
  return el;
}

function buildAnimCjkSvg(data, mode) {
  const uid = `${mode}-${Date.now()}-${Math.floor(Math.random() * 99999)}`;
  const svg = makeSvgEl('svg', { viewBox:data.viewBox, 'aria-label':'AnimCJK 注音筆畫' });
  const defs = makeSvgEl('defs');
  svg.appendChild(defs);

  data.outlines.forEach((d, i) => {
    const p = makeSvgEl('path', { id:`${uid}-d${i}`, d });
    defs.appendChild(p);
    const clip = makeSvgEl('clipPath', { id:`${uid}-c${i}` });
    clip.appendChild(makeSvgEl('use', { href:`#${uid}-d${i}` }));
    defs.appendChild(clip);
  });

  data.outlines.forEach((_, i) => {
    const u = makeSvgEl('use', { href:`#${uid}-d${i}`, class:'animcjk-outline' });
    if (mode === 'practice') u.setAttribute('opacity', '.62');
    svg.appendChild(u);
  });

  const sweeps = data.sweeps.map((d, i) => {
    const p = makeSvgEl('path', {
      d,
      class: mode === 'practice' ? 'animcjk-sweep practice-sweep' : 'animcjk-sweep',
      'clip-path':`url(#${uid}-c${i})`,
      pathLength:'3333'
    });
    p.style.strokeDasharray = '3333';
    p.style.strokeDashoffset = '3333';
    svg.appendChild(p);
    return p;
  });

  const guides = [];
  if (mode === 'practice') {
    data.sweeps.forEach((d, i) => {
      const g = makeSvgEl('path', { d, class:'practice-guide-path' });
      svg.appendChild(g);
      guides.push(g);
    });
    const user = makeSvgEl('path', { class:'practice-user-path' });
    svg.appendChild(user);
    return { svg, sweeps, guides, user };
  }
  return { svg, sweeps };
}

function setDash(path, value) {
  path.style.strokeDasharray = '3333';
  path.style.strokeDashoffset = String(value);
}

function animatePath(path, duration = 850) {
  path.getAnimations().forEach(a => a.cancel());
  path.style.strokeDasharray = '3333';
  path.style.strokeDashoffset = '3333';
  return path.animate([
    { strokeDashoffset: 3333 },
    { strokeDashoffset: 0 }
  ], { duration, easing:'linear', fill:'forwards' }).finished.then(() => {
    path.style.strokeDashoffset = '0';
  });
}

function buildDots(count) {
  return Array.from({length:count}, (_,i)=>`<span class="stroke-dot" data-stroke-dot="${i}">${i+1}</span>`).join('');
}

function updateAnimProgress() {
  const dots = document.querySelectorAll('#anim-progress .stroke-dot');
  dots.forEach((d,i)=>{
    d.classList.toggle('done', i < demoStep);
    d.classList.toggle('active', i === demoStep && demoStep < dots.length);
  });
}

async function playDemo() {
  if (!animEls.length) return;
  replayAnim(false);
  for (let i = 0; i < animEls.length; i++) {
    demoStep = i;
    updateAnimProgress();
    await animatePath(animEls[i], 850);
    demoStep = i + 1;
    updateAnimProgress();
    await new Promise(r => setTimeout(r, 220));
  }
}

function replayAnim(autoplay = true) {
  demoStep = 0;
  animEls.forEach(p => { p.getAnimations().forEach(a=>a.cancel()); setDash(p, 3333); });
  updateAnimProgress();
  if (autoplay) playDemo();
}

function svgPoint(evt) {
  const svg = practiceEls.svg;
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}
function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }
function pathPoint(path, ratio) {
  const len = path.getTotalLength();
  const p = path.getPointAtLength(len * ratio);
  return {x:p.x, y:p.y};
}
function closestDistanceToPath(pt, path, samples=90) {
  let best = Infinity, bestRatio = 0;
  const len = path.getTotalLength();
  for (let i=0;i<=samples;i++) {
    const ratio = i / samples;
    const p = path.getPointAtLength(len * ratio);
    const d = Math.hypot(pt.x - p.x, pt.y - p.y);
    if (d < best) { best = d; bestRatio = ratio; }
  }
  return {distance:best, ratio:bestRatio};
}
function pointsToD(pts) {
  if (!pts.length) return '';
  return 'M ' + pts.map(p=>`${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' L ');
}
function validateStroke(pts, targetPath) {
  if (pts.length < 8) return {ok:false, reason:'筆畫太短，請完整描完'};
  const start = pathPoint(targetPath, 0);
  const end = pathPoint(targetPath, 1);
  const startOk = dist(pts[0], start) < 130;
  const endOk = dist(pts[pts.length - 1], end) < 150;
  if (!startOk) return {ok:false, reason:'起筆位置不對，請從正確位置開始'};
  if (!endOk) return {ok:false, reason:'收筆位置不對，請依方向寫到底'};

  const ratios = [];
  let closeCount = 0;
  for (const p of pts) {
    const c = closestDistanceToPath(p, targetPath, 80);
    ratios.push(c.ratio);
    if (c.distance < 120) closeCount++;
  }
  const closeRate = closeCount / pts.length;
  const coverage = Math.max(...ratios) - Math.min(...ratios);
  let forward = 0;
  for (let i=1;i<ratios.length;i++) if (ratios[i] >= ratios[i-1] - .08) forward++;
  const forwardRate = forward / Math.max(1, ratios.length - 1);
  if (closeRate < .66) return {ok:false, reason:'偏離字形太多，請沿著灰色筆畫寫'};
  if (coverage < .58) return {ok:false, reason:'覆蓋範圍不夠，請把這一筆寫完整'};
  if (forwardRate < .58) return {ok:false, reason:'方向可能反了，請照筆順方向書寫'};
  return {ok:true};
}

function updatePracticeUI(kind='wait', text) {
  const res = document.getElementById('quiz-result');
  res.className = 'quiz-result' + (kind === 'ok' ? ' ok' : kind === 'no' ? ' no' : '');
  if (text) res.textContent = text;
  if (!practiceEls) return;
  practiceEls.guides.forEach((g,i)=> g.style.display = i === currentPractice ? 'block' : 'none');
}

function completeCurrentStroke() {
  setDash(practiceEls.sweeps[currentPractice], 0);
  currentPractice++;
  practiceEls.user.setAttribute('d','');
  if (currentPractice >= practiceEls.sweeps.length) {
    updatePracticeUI('ok', '✓ 太棒了！完成描字！🌟');
    playFeedbackSfx('correct');
  } else {
    updatePracticeUI('ok', `第 ${currentPractice} 筆完成！請繼續第 ${currentPractice + 1} 筆`);
    playFeedbackSfx('correct');
  }
}

function bindPracticeEvents() {
  const svg = practiceEls.svg;
  svg.addEventListener('pointerdown', e => {
    if (currentPractice >= practiceEls.sweeps.length) return;
    svg.setPointerCapture(e.pointerId);
    drawing = true;
    drawPoints = [svgPoint(e)];
    practiceEls.user.setAttribute('d', pointsToD(drawPoints));
    updatePracticeUI('wait', `描寫第 ${currentPractice + 1} 筆`);
  });
  svg.addEventListener('pointermove', e => {
    if (!drawing) return;
    drawPoints.push(svgPoint(e));
    practiceEls.user.setAttribute('d', pointsToD(drawPoints));
  });
  function finishPointer(e) {
    if (!drawing) return;
    drawing = false;
    drawPoints.push(svgPoint(e));
    practiceEls.user.setAttribute('d', pointsToD(drawPoints));
    const result = validateStroke(drawPoints, practiceEls.guides[currentPractice]);
    if (result.ok) completeCurrentStroke();
    else {
      updatePracticeUI('no', result.reason);
      playFeedbackSfx('wrong');
      setTimeout(()=> practiceEls.user.setAttribute('d',''), 700);
    }
  }
  svg.addEventListener('pointerup', finishPointer);
  svg.addEventListener('pointercancel', () => { drawing = false; practiceEls.user.setAttribute('d',''); });
}

function resetQuiz() {
  currentPractice = 0;
  drawing = false;
  drawPoints = [];
  if (practiceEls) {
    practiceEls.user.setAttribute('d','');
    practiceEls.sweeps.forEach(p => setDash(p, 3333));
  }
  updatePracticeUI('wait', '請依照筆順描寫灰色字形');
}

async function initAnimCjk(char) {
  const animTarget = document.getElementById('anim-target');
  const quizTarget = document.getElementById('quiz-target');
  const progress = document.getElementById('anim-progress');
  animTarget.innerHTML = '<span style="color:#aaa;font-weight:700">載入中…</span>';
  quizTarget.innerHTML = '<span style="color:#aaa;font-weight:700">載入中…</span>';
  document.getElementById('quiz-result').textContent = '';
  document.getElementById('quiz-result').className = 'quiz-result';

  try {
    currentSvgData = await fetchAnimCjkSvg(char);
    const anim = buildAnimCjkSvg(currentSvgData, 'anim');
    const practice = buildAnimCjkSvg(currentSvgData, 'practice');
    animTarget.innerHTML = '';
    quizTarget.innerHTML = '';
    animTarget.appendChild(anim.svg);
    quizTarget.appendChild(practice.svg);
    animEls = anim.sweeps;
    practiceEls = practice;
    progress.innerHTML = buildDots(animEls.length);
    demoStep = 0;
    currentPractice = 0;
    bindPracticeEvents();
    resetQuiz();
    replayAnim(true);
  } catch (err) {
    console.error(err);
    animTarget.innerHTML = `<span style="color:#b45309;font-weight:700">SVG 載入失敗：${err.message}</span>`;
    quizTarget.innerHTML = `<span style="color:#b45309;font-weight:700">請確認 ${ANIMCJK_BASE}/${symbolToSvgFile(char)} 是否存在</span>`;
  }
}

// ===== 符號列 =====
function buildBar() {
  const bc = document.getElementById('bar-consonant');
  const bv = document.getElementById('bar-vowel');
  ALL_SYMBOLS.forEach((sym, idx) => {
    const chip = document.createElement('div');
    chip.className = 'bar-chip';
    chip.textContent = sym.char;
    chip.dataset.index = idx;
    chip.addEventListener('click', () => goTo(idx));
    (sym.type === '聲母' ? bc : bv).appendChild(chip);
  });
}

function updateBar() {
  document.querySelectorAll('.bar-chip').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.index) === currentIndex);
  });
  const chip = document.querySelector(`.bar-chip[data-index="${currentIndex}"]`);
  if (chip) chip.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

// ===== 主渲染 =====
function render() {
  const sym = ALL_SYMBOLS[currentIndex];

  // 符號資訊
  const charEl = document.getElementById('sym-char');
  charEl.textContent = sym.char;
  charEl.style.animation = 'none';
  requestAnimationFrame(() => charEl.style.animation = '');

  document.getElementById('sym-type').textContent   = sym.type;
  document.getElementById('sym-stroke').textContent = `${sym.strokes} 畫`;

  // AnimCJK SVG 筆順與描字
  initAnimCjk(sym.char);

  // 例字
  document.getElementById('examples-title').textContent = `📖 ${sym.char} 的例字`;
  const grid = document.getElementById('examples-grid');
  grid.innerHTML = '';
  sym.examples.forEach(ex => {
    const div = document.createElement('div');
    div.className = 'example-item';
    div.innerHTML = `
      <span class="ex-emoji">${ex.e}</span>
      ${renderAnnotatedWord(ex.w, ex.n)}
    `;
    div.addEventListener('click', () => speak(ex.w));
    grid.appendChild(div);
  });
}

function renderAnnotatedWord(word, reading) {
  const chars = Array.from(word);
  const syllables = reading.trim().split(/\s+/);
  const pairs = chars.map((char, index) => {
    const syllable = syllables[index] || '';
    const neutral = syllable.startsWith('˙');
    const toneMatch = syllable.match(/[ˊˇˋ]$/);
    const tone = neutral ? '' : (toneMatch ? toneMatch[0] : '');
    const symbols = `${neutral ? '<span class="zhuyin-symbol zhuyin-neutral">˙</span>' : ''}${Array.from(syllable.replace(/^˙|[ˊˇˋ]$/g, ''))
      .map(symbol => `<span class="zhuyin-symbol">${symbol}</span>`)
      .join('')}`;
    return `<span class="zhuyin-pair" aria-hidden="true">
      <span class="zhuyin-hanzi">${char}</span>
      <span class="zhuyin-reading">
        <span class="zhuyin-symbols">${symbols}${tone ? `<span class="zhuyin-tone">${tone}</span>` : ''}</span>
      </span>
    </span>`;
  }).join('');

  return `<span class="ex-word" aria-label="${word}，${reading}">${pairs}</span>`;
}

function goTo(idx) {
  currentIndex = (idx + ALL_SYMBOLS.length) % ALL_SYMBOLS.length;
  render();
  updateBar();
}

// ===== 音效 =====
let voices = [];
function loadVoices() { voices = speechSynthesis.getVoices(); }
if (window.speechSynthesis) {
  loadVoices();
  speechSynthesis.addEventListener('voiceschanged', loadVoices);
}

const audioCache = {};
let currentSymbolAudio = null;
function speak(text) {
  const sym = ALL_SYMBOLS[currentIndex];
  if (text === sym.char) {
    if (currentSymbolAudio) {
      currentSymbolAudio.pause();
      currentSymbolAudio.currentTime = 0;
    }
    if (window.speechSynthesis) speechSynthesis.cancel();
    const path = `audio/${text}.mp3`;
    if (!audioCache[text]) audioCache[text] = new Audio(path);
    const a = audioCache[text];
    currentSymbolAudio = a;
    a.currentTime = 0;
    a.play().catch(() => speakTTS(text));
  } else {
    speakTTS(text);
  }
}

function speakTTS(text) {
  if (currentSymbolAudio) {
    currentSymbolAudio.pause();
    currentSymbolAudio.currentTime = 0;
  }
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW'; u.rate = 0.75;
  const v = voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
  if (v) u.voice = v;
  setTimeout(() => speechSynthesis.speak(u), 50);
}

let feedbackAudio = null;
function playFeedbackSfx(kind) {
  if (feedbackAudio) { feedbackAudio.pause(); feedbackAudio = null; }
  const index = Math.floor(Math.random() * 3) + 1;
  const audio = new Audio(`audio/sfx/${kind}_${index}.wav`);
  feedbackAudio = audio;
  const done = () => { if (feedbackAudio === audio) feedbackAudio = null; };
  audio.onended = done;
  audio.onerror = done;
  audio.play().catch(done);
}

// ===== 按鈕事件 =====
document.getElementById('speak-btn').addEventListener('click', () => speak(ALL_SYMBOLS[currentIndex].char));
document.getElementById('prev-btn').addEventListener('click', () => goTo(currentIndex - 1));
document.getElementById('next-btn').addEventListener('click', () => goTo(currentIndex + 1));

document.addEventListener('gesturestart', event => event.preventDefault(), { passive:false });
document.addEventListener('dblclick', event => event.preventDefault(), { passive:false });
document.addEventListener('touchmove', event => {
  if (event.touches.length > 1) event.preventDefault();
}, { passive:false });

// ===== 符號列慣性拖拉 =====
const bar = document.querySelector('.symbol-bar');
let isDragging=false, startX=0, scrollLeft=0, velX=0, lastX=0, lastTime=0, rafId=null;
function stopInertia() { if(rafId){cancelAnimationFrame(rafId);rafId=null;} }
function applyInertia() { velX*=0.92; if(Math.abs(velX)<0.5)return; bar.scrollLeft-=velX; rafId=requestAnimationFrame(applyInertia); }
bar.addEventListener('mousedown', e=>{ stopInertia(); isDragging=true; startX=e.pageX-bar.offsetLeft; scrollLeft=bar.scrollLeft; lastX=e.pageX; lastTime=Date.now(); velX=0; bar.classList.add('grabbing'); });
bar.addEventListener('mousemove', e=>{ if(!isDragging)return; e.preventDefault(); const now=Date.now(),dx=e.pageX-lastX,dt=now-lastTime||1; velX=dx/dt*16; lastX=e.pageX; lastTime=now; bar.scrollLeft=scrollLeft-(e.pageX-bar.offsetLeft-startX); });
function endDrag(){ if(!isDragging)return; isDragging=false; bar.classList.remove('grabbing'); rafId=requestAnimationFrame(applyInertia); }
bar.addEventListener('mouseup', endDrag);
bar.addEventListener('mouseleave', endDrag);

// ===== URL 參數 =====
function initFromURL() {
  const s = new URLSearchParams(location.search).get('s');
  if (s) {
    const idx = ALL_SYMBOLS.findIndex(sym => sym.char === s);
    if (idx >= 0) currentIndex = idx;
  }
}

// ===== 啟動 =====
initFromURL();
buildBar();
render();
updateBar();
</script>
