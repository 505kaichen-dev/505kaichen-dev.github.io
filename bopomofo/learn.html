<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>注音樂園 · 符號教學</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF9F0;
      --primary: #FF6B35;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --ink: #2C2C2C;
      --card: #FFFFFF;
      --soft: #F0F4FF;
      --radius: 20px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Nunito', 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--primary);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(255,107,53,0.25);
    }
    .header-back { text-decoration:none; color:#fff; font-weight:700; font-size:1rem; opacity:0.9; }
    .header-back:hover { opacity:1; }
    .header-title { font-size:1.4rem; font-weight:900; letter-spacing:3px; }
    .header-chart {
      text-decoration:none; color:#fff; font-size:0.85rem; font-weight:700;
      opacity:0.8; border:2px solid rgba(255,255,255,0.5);
      border-radius:20px; padding:4px 12px;
    }

    /* ===== 符號快速列 ===== */
    .symbol-bar {
      background: var(--soft);
      padding: 10px 16px;
      overflow-x: scroll;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      display: flex;
      gap: 6px;
      align-items: center;
      border-bottom: 2px solid #e0e4f0;
      position: sticky;
      top: 57px;
      z-index: 90;
      cursor: grab;
    }
    .symbol-bar::-webkit-scrollbar { display: none; }
    .symbol-bar.grabbing { cursor: grabbing; }
    .bar-group { display: flex; gap: 5px; flex-shrink: 0; }
    .bar-group + .bar-group { margin-left:6px; padding-left:6px; border-left:2px dashed #c8cce0; }
    .bar-chip {
      width:36px; height:36px; border-radius:50%;
      background:var(--card); border:2px solid #d0d4e8;
      display:flex; align-items:center; justify-content:center;
      font-size:0.95rem; font-weight:900; cursor:pointer;
      transition:all .15s; flex-shrink:0; color:var(--ink);
    }
    .bar-chip:hover { border-color:var(--primary); transform:scale(1.15); }
    .bar-chip.active {
      background:var(--primary); color:#fff; border-color:var(--primary);
      transform:scale(1.2); box-shadow:0 4px 12px rgba(255,107,53,0.35);
    }

    /* ===== 主容器 ===== */
    main { flex:1; max-width:900px; margin:0 auto; padding:20px 16px 60px; width:100%; }

    /* ===== 符號資訊列 ===== */
    .symbol-info { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
    .symbol-display {
      font-size:5rem; font-weight:900; color:var(--primary);
      line-height:1; animation:popIn .3s ease;
    }
    @keyframes popIn {
      0% { transform:scale(0.7); opacity:0; }
      70% { transform:scale(1.1); }
      100% { transform:scale(1); opacity:1; }
    }
    .symbol-meta { display:flex; flex-direction:column; gap:6px; }
    .symbol-type-badge {
      display:inline-block; padding:3px 12px; border-radius:50px;
      font-size:0.8rem; font-weight:700; background:var(--accent); color:var(--ink);
    }
    .symbol-stroke-info { font-size:0.9rem; color:#888; font-weight:700; }
    .speak-btn {
      background:var(--secondary); border:none; border-radius:50px;
      padding:10px 24px; font-family:inherit; font-size:1rem;
      font-weight:700; cursor:pointer; color:#fff; transition:transform .15s;
    }
    .speak-btn:hover { transform:scale(1.05); }
    .symbol-nav { margin-left:auto; display:flex; gap:8px; }
    .nav-btn {
      padding:8px 16px; border-radius:var(--radius-sm);
      border:2px solid #d0d4e8; background:var(--card);
      font-family:inherit; font-size:0.9rem; font-weight:700;
      cursor:pointer; transition:all .15s; color:var(--ink);
    }
    .nav-btn:hover { border-color:var(--primary); color:var(--primary); }

    /* ===== 主學習區 ===== */
    .learn-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:20px; margin-bottom:24px;
    }
    .learn-card {
      background:var(--card); border-radius:var(--radius);
      padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.07);
      display:flex; flex-direction:column; align-items:center; gap:12px;
    }
    .card-title {
      font-size:0.85rem; font-weight:700; color:#888;
      letter-spacing:0.05em; align-self:flex-start;
    }

    /* Tab 切換 */
    .tab-row { display:flex; gap:8px; width:100%; }
    .tab-btn {
      flex:1; padding:7px; border-radius:var(--radius-sm);
      font-family:inherit; font-size:0.85rem; font-weight:700;
      cursor:pointer; transition:all .15s; border:2px solid #d0d4e8;
      background:#fff; color:var(--ink);
    }
    .tab-btn.active {
      background:var(--primary); color:#fff; border-color:var(--primary);
    }

    /* Hanzi Writer 容器 */
    .hw-wrap {
      width:100%; aspect-ratio:1;
      background:#f8f8f8; border-radius:var(--radius-sm);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }

    /* 靜態圖 */
    .static-wrap {
      width:100%; aspect-ratio:1;
      background:#f8f8f8; border-radius:var(--radius-sm);
      display:none; align-items:center; justify-content:center;
    }
    .static-wrap img {
      width:85%; height:85%; object-fit:contain;
    }

    /* 描字結果 */
    .quiz-result {
      font-size:0.9rem; font-weight:700;
      padding:6px 16px; border-radius:50px;
      min-height:30px; text-align:center; width:100%;
    }
    .quiz-result.ok { background:#E8FAF9; color:#0f6e56; }
    .quiz-result.no { background:#FFF5E0; color:#b45309; }

    .reset-btn {
      padding:8px 24px; border-radius:50px;
      border:2px solid #d0d4e8; background:var(--card);
      font-family:inherit; font-size:0.9rem; font-weight:700;
      cursor:pointer; color:var(--ink); transition:all .15s;
    }
    .reset-btn:hover { border-color:var(--secondary); color:var(--secondary); }

    /* ===== 例字區 ===== */
    .examples-card {
      background:var(--card); border-radius:var(--radius);
      padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.07);
    }
    .examples-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:12px; margin-top:12px;
    }
    .example-item {
      background:var(--soft); border-radius:var(--radius-sm);
      padding:14px 10px; text-align:center; cursor:pointer;
      transition:transform .15s; border:2px solid transparent;
    }
    .example-item:hover { transform:translateY(-3px); border-color:var(--secondary); }
    .ex-emoji { font-size:2rem; display:block; margin-bottom:6px; }
    .ex-word  { font-size:1.1rem; font-weight:900; display:block; }
    .ex-note  { font-size:0.72rem; color:#888; display:block; margin-top:2px; }

    /* ===== FOOTER ===== */
    footer {
      text-align:center; padding:20px; color:#aaa;
      font-size:0.8rem; border-top:1px solid #e8e8e8;
    }

    /* ===== 響應式 ===== */
    @media (max-width:640px) {
      .learn-grid { grid-template-columns:1fr; }
      .symbol-display { font-size:3.5rem; }
      .symbol-nav { display:none; }
    }
  </style>
</head>
<body>

<header>

      <button class="speak-btn" id="speak-btn">🔊 聽發音</button>
    </div>
    <div class="symbol-nav">

    </div>
  </div>

  <div class="learn-grid">

    <div class="learn-card">
      <div class="card-title">✍️ 筆順示範</div>

      </div>
      <div class="hw-wrap" id="anim-wrap">
        <div id="anim-target"></div>
      </div>
      <div class="static-wrap" id="static-wrap">
        <img id="static-img" src="" alt="字形"/>
      </div>
      <button class="reset-btn" id="replay-btn" onclick="replayAnim()">▶ 再播一次</button>
    </div>

    <!-- 右：描字練習 -->
    <div class="learn-card">
      <div class="card-title">🖌️ 描字練習</div>
      <div class="hw-wrap">
        <div id="quiz-target"></div>
      </div>
      <div class="quiz-result" id="quiz-result"></div>
      <button class="reset-btn" onclick="resetQuiz()">↺ 重新練習</button>
    </div>

  </div>

  <!-- 例字區 -->
  <div class="examples-card">
    <div class="card-title" id="examples-title">📖 ㄅ 的例字</div>
    <div class="examples-grid" id="examples-grid"></div>
  </div>
</main>

const CONSONANTS = ALL_SYMBOLS.filter(s => s.type === '聲母');
const VOWELS     = ALL_SYMBOLS.filter(s => s.type === '韻母');
const DATA_BASE  = 'https://raw.githubusercontent.com/MadLadSquad/hanzi-writer-data-youyin/master/data/';

// ===== Hanzi Writer =====
let animWriter = null;
let quizWriter = null;
let currentIndex = 0;
let currentTab = 'anim';

function charDataLoader(char, onLoad, onError) {
  fetch(DATA_BASE + encodeURIComponent(char) + '.json')
    .then(r => r.json())
    .then(data => onLoad(data))
    .catch(err => onError(err));
}

const HW_COMMON = {
  width: 280, height: 280,
  padding: 8,
  strokeWidth: 32,
  showOutline: true,
  outlineColor: '#d8d0c8',
  charDataLoader,
};

function initHanziWriter(char) {
  // 動畫 writer
  document.getElementById('anim-target').innerHTML = '';
  animWriter = HanziWriter.create('anim-target', char, {
    ...HW_COMMON,
    strokeColor: '#FF6B35',
    strokeAnimationSpeed: 0.48,
    delayBetweenStrokes: 800,
  });

  // 描字 writer
  document.getElementById('quiz-target').innerHTML = '';
  document.getElementById('quiz-result').textContent = '';
  document.getElementById('quiz-result').className = 'quiz-result';

  quizWriter = HanziWriter.create('quiz-target', char, {
    ...HW_COMMON,
    showCharacter: false,
    strokeColor: '#4ECDC4',
    drawingColor: '#4ECDC4',
    drawingWidth: 72,
  });

  // 自動播放
  setTimeout(() => {
    if (currentTab === 'anim') animWriter.animateCharacter();
    startQuiz();
  }, 300);
}

function startQuiz() {
  quizWriter.quiz({
    onMistake: (data) => {
      const res = document.getElementById('quiz-result');
      res.className = 'quiz-result no';
      res.textContent = `第 ${data.strokeNum + 1} 畫再試試看 ✏️`;
      speakFeedback('再試試看！');
    },
    onCorrectStroke: (data) => {
      const res = document.getElementById('quiz-result');
      res.className = 'quiz-result ok';
      res.textContent = `第 ${data.strokeNum + 1} 畫正確！繼續加油 🎉`;
      speakFeedback('答對了！');
    },
    onComplete: (summary) => {
      const res = document.getElementById('quiz-result');
      res.className = 'quiz-result ok';
      const mistakes = summary.totalMistakes || 0;
      res.textContent = mistakes === 0
        ? '✓ 太棒了！完美寫完！🌟'
        : `✓ 完成！繼續練習會更好 😊`;
      speakFeedback(mistakes === 0 ? '太棒了！寫得非常好！' : '寫完了！繼續加油！');
    },
  });
}

function resetQuiz() {
  document.getElementById('quiz-result').textContent = '';
  document.getElementById('quiz-result').className = 'quiz-result';
  quizWriter.cancelQuiz();
  startQuiz();
}

function replayAnim() {
  if (animWriter) animWriter.animateCharacter();
}

// ===== Tab 切換 =====
function switchTab(tab) {
  currentTab = tab;
  const animWrap   = document.getElementById('anim-wrap');
  const staticWrap = document.getElementById('static-wrap');
  const replayBtn  = document.getElementById('replay-btn');
  const tabAnim    = document.getElementById('tab-anim');
  const tabStatic  = document.getElementById('tab-static');

  if (tab === 'anim') {
    animWrap.style.display   = 'flex';
    staticWrap.style.display = 'none';
    replayBtn.style.display  = 'block';
    tabAnim.classList.add('active');
    tabStatic.classList.remove('active');
  } else {
    animWrap.style.display   = 'none';
    staticWrap.style.display = 'flex';
    replayBtn.style.display  = 'none';
    tabStatic.classList.add('active');
    tabAnim.classList.remove('active');
  }
}

// ===== 符號列 =====
function buildBar() {
  const bc = document.getElementById('bar-consonant');
  const bv = document.getElementById('bar-vowel');
  ALL_SYMBOLS.forEach((sym, idx) => {
    const chip = document.createElement('div');
    chip.className = 'bar-chip';
    chip.textContent = sym.char;
    chip.dataset.index = idx;
    chip.addEventListener('click', () => goTo(idx));
    (sym.type === '聲母' ? bc : bv).appendChild(chip);
  });
}

function updateBar() {
  document.querySelectorAll('.bar-chip').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.index) === currentIndex);
  });
  const chip = document.querySelector(`.bar-chip[data-index="${currentIndex}"]`);
  if (chip) chip.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

// ===== 主渲染 =====
function render() {
  const sym = ALL_SYMBOLS[currentIndex];

  // 符號資訊
  const charEl = document.getElementById('sym-char');
  charEl.textContent = sym.char;
  charEl.style.animation = 'none';
  requestAnimationFrame(() => charEl.style.animation = '');

  document.getElementById('sym-type').textContent   = sym.type;
  document.getElementById('sym-stroke').textContent = `${sym.strokes} 畫`;

  // 靜態圖
  document.getElementById('static-img').src = `images/${sym.img}`;

  // Hanzi Writer
  initHanziWriter(sym.char);

  // 例字
  document.getElementById('examples-title').textContent = `📖 ${sym.char} 的例字`;
  document.getElementById('examples-grid').innerHTML = sym.examples.map(ex => `
    <div class="example-item" onclick="speak('${ex.w}')">
      <span class="ex-emoji">${ex.e}</span>
      <span class="ex-word">${ex.w}</span>
      <span class="ex-note">${ex.n}</span>
    </div>
  `).join('');
}

function goTo(idx) {
  currentIndex = (idx + ALL_SYMBOLS.length) % ALL_SYMBOLS.length;
  render();
  updateBar();
}

// ===== 音效 =====
let voices = [];
function loadVoices() { voices = speechSynthesis.getVoices(); }
if (window.speechSynthesis) {
  loadVoices();
  speechSynthesis.addEventListener('voiceschanged', loadVoices);
}

const audioCache = {};
function speak(text) {
  const sym = ALL_SYMBOLS[currentIndex];
  if (text === sym.char) {
    const path = `audio/${text}.mp3`;
    if (!audioCache[text]) audioCache[text] = new Audio(path);
    const a = audioCache[text];
    a.currentTime = 0;
    a.play().catch(() => speakTTS(text));
  } else {
    speakTTS(text);
  }
}

function speakTTS(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW'; u.rate = 0.75;
  const v = voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
  if (v) u.voice = v;
  setTimeout(() => speechSynthesis.speak(u), 50);
}

function speakFeedback(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW'; u.rate = 0.9;
  const v = voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
  if (v) u.voice = v;
  setTimeout(() => speechSynthesis.speak(u), 80);
}

// ===== 按鈕事件 =====
document.getElementById('speak-btn').addEventListener('click', () => speak(ALL_SYMBOLS[currentIndex].char));
document.getElementById('prev-btn').addEventListener('click', () => goTo(currentIndex - 1));
document.getElementById('next-btn').addEventListener('click', () => goTo(currentIndex + 1));

// ===== 符號列慣性拖拉 =====
const bar = document.querySelector('.symbol-bar');
let isDragging=false, startX=0, scrollLeft=0, velX=0, lastX=0, lastTime=0, rafId=null;
function stopInertia() { if(rafId){cancelAnimationFrame(rafId);rafId=null;} }
function applyInertia() { velX*=0.92; if(Math.abs(velX)<0.5)return; bar.scrollLeft-=velX; rafId=requestAnimationFrame(applyInertia); }
bar.addEventListener('mousedown', e=>{ stopInertia(); isDragging=true; startX=e.pageX-bar.offsetLeft; scrollLeft=bar.scrollLeft; lastX=e.pageX; lastTime=Date.now(); velX=0; bar.classList.add('grabbing'); });
bar.addEventListener('mousemove', e=>{ if(!isDragging)return; e.preventDefault(); const now=Date.now(),dx=e.pageX-lastX,dt=now-lastTime||1; velX=dx/dt*16; lastX=e.pageX; lastTime=now; bar.scrollLeft=scrollLeft-(e.pageX-bar.offsetLeft-startX); });
function endDrag(){ if(!isDragging)return; isDragging=false; bar.classList.remove('grabbing'); rafId=requestAnimationFrame(applyInertia); }
bar.addEventListener('mouseup', endDrag);
bar.addEventListener('mouseleave', endDrag);

// ===== URL 參數 =====
function initFromURL() {
  const s = new URLSearchParams(location.search).get('s');
  if (s) {
    const idx = ALL_SYMBOLS.findIndex(sym => sym.char === s);
    if (idx >= 0) currentIndex = idx;
  }
}

// ===== 啟動 =====
initFromURL();
buildBar();
render();
updateBar();
</script>
