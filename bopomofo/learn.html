<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ㄅㄆㄇ 注音學習</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF9F0;
      --primary: #FF6B35;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --ink: #2C2C2C;
      --card: #FFFFFF;
      --soft: #F0F4FF;
      --radius: 24px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Nunito', 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--primary);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(255,107,53,0.25);
    }

    .header-back {
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      opacity: 0.9;
      transition: opacity .2s;
    }
    .header-back:hover { opacity: 1; }

    .header-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; }

    .header-chart {
      text-decoration: none;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      opacity: 0.8;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 4px 12px;
      transition: opacity .2s;
    }
    .header-chart:hover { opacity: 1; }

    /* ===== 符號快速列 ===== */
    .symbol-bar {
      background: var(--soft);
      padding: 10px 16px;
      overflow-x: scroll;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;       /* Firefox */
      display: flex;
      gap: 6px;
      align-items: center;
      border-bottom: 2px solid #e0e4f0;
      position: sticky;
      top: 57px;
      z-index: 90;
      cursor: grab;
    }
    .symbol-bar::-webkit-scrollbar { display: none; } /* Chrome/Safari */
    .symbol-bar.grabbing { cursor: grabbing; }

    .bar-group {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .bar-group + .bar-group {
      margin-left: 6px;
      padding-left: 6px;
      border-left: 2px dashed #c8cce0;
    }

    .bar-chip {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid #d0d4e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: 900;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
      color: var(--ink);
    }
    .bar-chip:hover { border-color: var(--primary); transform: scale(1.15); }
    .bar-chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      transform: scale(1.2);
      box-shadow: 0 4px 12px rgba(255,107,53,0.35);
    }

    /* ===== 模式切換 ===== */
    .mode-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px 16px 0;
    }

    .mode-btn {
      padding: 10px 22px;
      border-radius: 50px;
      border: 3px solid #d0d4e8;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--card);
      color: var(--ink);
      transition: all .2s;
    }
    .mode-btn:hover { border-color: var(--primary); color: var(--primary); }
    .mode-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 4px 14px rgba(255,107,53,0.3);
    }

    /* ===== 主容器 ===== */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ===== 模式一：認識符號 ===== */
    .learn-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .symbol-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 36px 24px;
      text-align: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.07);
    }

    .symbol-big {
      font-size: 8rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      display: block;
      margin-bottom: 8px;
      animation: popIn .3s ease;
    }

    @keyframes popIn {
      0%   { transform: scale(0.6); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .symbol-type {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .speak-btn {
      background: var(--accent);
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s;
    }
    .speak-btn:hover  { transform: scale(1.08); }
    .speak-btn:active { transform: scale(0.95); }

    .nav-row {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 10px;
    }

    .nav-btn {
      flex: 1;
      padding: 10px;
      border-radius: var(--radius-sm);
      border: 2px solid #d0d4e8;
      background: var(--card);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .nav-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* 例字卡 */
    .example-card {
      background: var(--soft);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.05);
    }

    .example-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #888;
      margin-bottom: 4px;
    }

    .example-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      cursor: pointer;
      transition: transform .15s;
    }
    .example-item:hover { transform: translateX(4px); }

    .ex-emoji { font-size: 2.2rem; }
    .ex-word  { font-size: 1.3rem; font-weight: 900; }
    .ex-note  { font-size: 0.8rem; color: #aaa; }

    /* ===== 模式二：配對遊戲 ===== */
    .match-info {
      text-align: center;
      padding: 16px;
      color: #888;
      font-size: 0.95rem;
    }

    .match-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .match-card {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 18px 8px;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.07);
      border: 3px solid transparent;
      transition: all .2s;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .match-card:hover    { border-color: var(--secondary); transform: translateY(-3px); }
    .match-card.selected { border-color: var(--primary);   background: #FFF0EB; }
    .match-card.matched  { border-color: var(--secondary); background: #E8FAF9; pointer-events: none; }
    .match-card.wrong    { border-color: #FF4444;          background: #FFF0F0; animation: shake .3s; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .match-result {
      text-align: center;
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 700;
      min-height: 32px;
    }

    .match-restart {
      display: block;
      margin: 16px auto 0;
      padding: 10px 28px;
      border-radius: 50px;
      border: none;
      background: var(--secondary);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s;
    }
    .match-restart:hover { transform: scale(1.05); }

    /* ===== 模式三：聽音選字 ===== */
    .listen-wrap { text-align: center; margin-top: 20px; }

    .listen-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 36px 24px;
      margin-bottom: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.07);
    }

    .listen-big-btn {
      background: var(--secondary);
      border: none;
      border-radius: 50%;
      width: 110px;
      height: 110px;
      font-size: 2.8rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(78,205,196,0.35);
      transition: transform .15s;
      margin-bottom: 14px;
    }
    .listen-big-btn:hover  { transform: scale(1.1); }
    .listen-big-btn:active { transform: scale(0.95); }

    .listen-hint { font-size: 0.95rem; color: #888; }

    .listen-score {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--secondary);
      margin-top: 6px;
    }

    .listen-choices {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .choice-btn {
      background: var(--card);
      border: 3px solid #d0d4e8;
      border-radius: var(--radius-sm);
      padding: 22px;
      font-family: inherit;
      font-size: 2.6rem;
      font-weight: 900;
      cursor: pointer;
      transition: all .18s;
    }
    .choice-btn:hover   { border-color: var(--primary); transform: scale(1.05); }
    .choice-btn.correct { border-color: var(--secondary); background: #E8FAF9; pointer-events: none; }
    .choice-btn.wrong   { border-color: #FF4444; background: #FFF0F0; animation: shake .3s; }

    .next-btn {
      display: none;
      margin: 20px auto 0;
      padding: 12px 32px;
      border-radius: 50px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s;
    }
    .next-btn:hover { transform: scale(1.05); }
    .next-btn.show  { display: block; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 24px;
      color: #aaa;
      font-size: 0.85rem;
      border-top: 1px solid #e8e8e8;
    }

    /* ===== 響應式 ===== */
    @media (max-width: 620px) {
      .learn-layout { grid-template-columns: 1fr; }
      .symbol-big   { font-size: 5.5rem; }
      .match-grid   { grid-template-columns: repeat(3, 1fr); }
      .mode-btn     { padding: 8px 14px; font-size: 0.85rem; }
    }
    @media (max-width: 400px) {
      .match-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

</main>

  { char:'ㄢ', type:'韻母', examples:[{e:'🌅',w:'晚上',n:'ㄨㄢˇ ㄕㄤ'},{e:'🧸',w:'熊貓',n:'ㄒㄩㄥˊ ㄇㄠ'},{e:'🍊',w:'橙',n:'ㄔㄥˊ'}] },
  { char:'ㄣ', type:'韻母', examples:[{e:'☁️',w:'嗯',n:'ㄣ'},{e:'🫀',w:'心',n:'ㄒㄧㄣ'},{e:'🌲',w:'森林',n:'ㄙㄣ ㄌㄧㄣˊ'}] },
  { char:'ㄤ', type:'韻母', examples:[{e:'🦅',w:'昂',n:'ㄤˊ'},{e:'☀️',w:'太陽',n:'ㄊㄞˋ ㄧㄤˊ'},{e:'🍬',w:'糖',n:'ㄊㄤˊ'}] },
  { char:'ㄥ', type:'韻母', examples:[{e:'🐝',w:'嗡嗡',n:'ㄨㄥ ㄨㄥ'},{e:'🌈',w:'彩虹',n:'ㄘㄞˇ ㄏㄨㄥˊ'},{e:'🦁',w:'獅子',n:'ㄕ ㄗ'}] },
  { char:'ㄦ', type:'韻母', examples:[{e:'👂',w:'耳朵',n:'ㄦˇ ㄉㄨㄛ'},{e:'🍀',w:'兒子',n:'ㄦˊ ㄗ'},{e:'🎪',w:'而且',n:'ㄦˊ ㄑㄧㄝˇ'}] },
  { char:'ㄧ', type:'韻母', examples:[{e:'1️⃣',w:'一',n:'ㄧ'},{e:'🎤',w:'唱歌',n:'ㄧ'},{e:'🌿',w:'蟻',n:'ㄧˇ'}] },
  { char:'ㄨ', type:'韻母', examples:[{e:'🐸',w:'青蛙',n:'ㄑㄧㄥ ㄨㄚ'},{e:'🐷',w:'豬',n:'ㄓㄨ'},{e:'🏡',w:'屋子',n:'ㄨ ㄗ'}] },
  { char:'ㄩ', type:'韻母', examples:[{e:'🐠',w:'魚',n:'ㄩˊ'},{e:'🌧️',w:'雨',n:'ㄩˇ'},{e:'🌕',w:'月亮',n:'ㄩㄝˋ ㄌㄧㄤˋ'}] },
];

const CONSONANTS = ALL_SYMBOLS.filter(s => s.type === '聲母');
const VOWELS     = ALL_SYMBOLS.filter(s => s.type === '韻母');

// ===== 狀態 =====
let currentIndex = 0;

// ===== 初始化符號列 =====
function buildBar() {
  const bc = document.getElementById('bar-consonant');
  const bv = document.getElementById('bar-vowel');

  ALL_SYMBOLS.forEach((sym, idx) => {
    const chip = document.createElement('div');
    chip.className = 'bar-chip';
    chip.textContent = sym.char;
    chip.dataset.index = idx;
    chip.addEventListener('click', () => goTo(idx));
    (sym.type === '聲母' ? bc : bv).appendChild(chip);
  });
}

function updateBar() {
  document.querySelectorAll('.bar-chip').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.index) === currentIndex);
  });
}

// ===== 跳到指定符號 =====
function goTo(idx) {
  currentIndex = (idx + ALL_SYMBOLS.length) % ALL_SYMBOLS.length;
  renderLearn();
  updateBar();
  // 滾動到對應 chip
  const chip = document.querySelector(`.bar-chip[data-index="${currentIndex}"]`);
  if (chip) chip.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

// ===== 模式一：渲染 =====
function renderLearn() {
  const sym = ALL_SYMBOLS[currentIndex];

  const el = document.getElementById('current-symbol');
  el.textContent = sym.char;
  el.style.animation = 'none';
  requestAnimationFrame(() => { el.style.animation = ''; });

  document.getElementById('current-type').textContent = sym.type;
  document.getElementById('example-title').textContent = `${sym.char} 的例字`;

  const list = document.getElementById('example-list');
  list.innerHTML = sym.examples.map(ex => `
    <div class="example-item" onclick="speak('${ex.w}')">
      <span class="ex-emoji">${ex.e}</span>
      <div>
        <div class="ex-word">${ex.w}</div>
        <div class="ex-note">${ex.n}</div>
      </div>
    </div>
  `).join('');
}

// ===== Web Speech API =====
function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW';
  u.rate = 0.75;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ===== 模式切換 =====
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${btn.dataset.mode}`).classList.add('active');

    if (btn.dataset.mode === 'match')  initMatch();
    if (btn.dataset.mode === 'listen') initListen();
  });
});

// 認識符號按鈕
document.getElementById('speak-btn').addEventListener('click', () => speak(ALL_SYMBOLS[currentIndex].char));
document.getElementById('prev-btn').addEventListener('click', () => goTo(currentIndex - 1));
document.getElementById('next-btn').addEventListener('click', () => goTo(currentIndex + 1));

// ===== 模式二：配對遊戲 =====
let matchSelected = null;
let matchPairs = 0;

function initMatch() {
  matchSelected = null;
  matchPairs = 0;
  document.getElementById('match-result').textContent = '';

  // 取 4 個符號
  const pool = [...ALL_SYMBOLS].sort(() => Math.random() - .5).slice(0, 4);
  const symbols = pool.map(s => ({ id: s.char, content: s.char, kind: 'char' }));
  const emojis  = pool.map(s => ({ id: s.char, content: s.examples[0].e, kind: 'emoji' }));
  const cards   = [...symbols, ...emojis].sort(() => Math.random() - .5);

  const grid = document.getElementById('match-grid');
  grid.innerHTML = cards.map((c, i) => `
    <div class="match-card" data-id="${c.id}" data-kind="${c.kind}" data-idx="${i}">
      ${c.content}
    </div>
  `).join('');

  grid.querySelectorAll('.match-card').forEach(card => {
    card.addEventListener('click', handleMatchClick);
  });
}

function handleMatchClick(e) {
  const card = e.currentTarget;
  if (card.classList.contains('matched')) return;

  if (!matchSelected) {
    matchSelected = card;
    card.classList.add('selected');
    return;
  }

  if (matchSelected === card) {
    matchSelected.classList.remove('selected');
    matchSelected = null;
    return;
  }

  if (matchSelected.dataset.id === card.dataset.id &&
      matchSelected.dataset.kind !== card.dataset.kind) {
    // 配對成功
    [matchSelected, card].forEach(c => {
      c.classList.remove('selected');
      c.classList.add('matched');
    });
    matchPairs++;
    speak('答對了');
    if (matchPairs === 4) {
      document.getElementById('match-result').textContent = '🎉 全部配對成功！好棒！';
    }
  } else {
    // 配對失敗
    card.classList.add('wrong');
    matchSelected.classList.add('wrong');
    const prev = matchSelected;
    setTimeout(() => {
      prev.classList.remove('wrong', 'selected');
      card.classList.remove('wrong');
    }, 600);
  }

  matchSelected = null;
}

document.getElementById('match-restart').addEventListener('click', initMatch);

// ===== 模式三：聽音選字 =====
let listenAnswer = '';
let listenScore  = 0;
let listenTotal  = 0;
let listenAnswered = false;

function initListen() {
  listenAnswered = false;
  document.getElementById('next-q-btn').classList.remove('show');

  // 取 1 個正確 + 3 個錯誤
  const shuffled = [...ALL_SYMBOLS].sort(() => Math.random() - .5);
  const correct  = shuffled[0];
  const wrong    = shuffled.slice(1, 4);
  listenAnswer   = correct.char;

  const choices = [correct, ...wrong].sort(() => Math.random() - .5);
  const grid = document.getElementById('listen-choices');
  grid.innerHTML = choices.map(s => `
    <button class="choice-btn" data-char="${s.char}">${s.char}</button>
  `).join('');

  grid.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', handleListenClick);
  });

  // 自動播音
  setTimeout(() => speak(correct.char), 400);
}

document.getElementById('play-btn').addEventListener('click', () => speak(listenAnswer));

function handleListenClick(e) {
  if (listenAnswered) return;
  listenAnswered = true;
  listenTotal++;

  const btn = e.currentTarget;
  if (btn.dataset.char === listenAnswer) {
    btn.classList.add('correct');
    listenScore++;
    speak('答對了');
  } else {
    btn.classList.add('wrong');
    // 顯示正確答案
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.dataset.char === listenAnswer) b.classList.add('correct');
    });
    speak('再試試看');
  }

  document.getElementById('listen-score').textContent = `答對：${listenScore} / ${listenTotal} 題`;
  document.getElementById('next-q-btn').classList.add('show');
}

document.getElementById('next-q-btn').addEventListener('click', initListen);

// ===== URL 參數讀取 =====
function initFromURL() {
  const params = new URLSearchParams(location.search);
  const s = params.get('s');
  if (s) {
    const idx = ALL_SYMBOLS.findIndex(sym => sym.char === s);
    if (idx >= 0) currentIndex = idx;
  }
}

// ===== 符號列：滑鼠拖拉 + 慣性 =====
const bar = document.querySelector('.symbol-bar');
let isDragging = false;
let startX = 0, scrollLeft = 0;
let velX = 0, lastX = 0, lastTime = 0;
let rafId = null;

function stopInertia() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

function applyInertia() {
  velX *= 0.92;                    // 衰減係數，越小停越快
  if (Math.abs(velX) < 0.5) return;
  bar.scrollLeft -= velX;
  rafId = requestAnimationFrame(applyInertia);
}

bar.addEventListener('mousedown', e => {
  stopInertia();
  isDragging = true;
  startX     = e.pageX - bar.offsetLeft;
  scrollLeft = bar.scrollLeft;
  lastX      = e.pageX;
  lastTime   = Date.now();
  velX       = 0;
  bar.classList.add('grabbing');
});

bar.addEventListener('mousemove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const now = Date.now();
  const dx  = e.pageX - lastX;
  const dt  = now - lastTime || 1;
  velX      = dx / dt * 16;        // 換算成每幀速度（~60fps）
  lastX     = e.pageX;
  lastTime  = now;
  bar.scrollLeft = scrollLeft - (e.pageX - bar.offsetLeft - startX);
});

function endDrag() {
  if (!isDragging) return;
  isDragging = false;
  bar.classList.remove('grabbing');
  rafId = requestAnimationFrame(applyInertia);
}

bar.addEventListener('mouseup',    endDrag);
bar.addEventListener('mouseleave', endDrag);

// ===== 啟動 =====
initFromURL();
buildBar();
renderLearn();
updateBar();
</script>
