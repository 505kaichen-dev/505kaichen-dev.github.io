<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ㄅㄆㄇ 符號教學</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF9F0;
      --primary: #FF6B35;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --ink: #2C2C2C;
      --card: #FFFFFF;
      --soft: #F0F4FF;
      --radius: 20px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Nunito', 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--primary);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(255,107,53,0.25);
    }
    .header-back {
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      opacity: 0.9;
      transition: opacity .2s;
    }
    .header-back:hover { opacity: 1; }
    .header-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; }
    .header-chart {
      text-decoration: none;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      opacity: 0.8;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 4px 12px;
    }

    /* ===== 符號快速列 ===== */
    .symbol-bar {
      background: var(--soft);
      padding: 10px 16px;
      overflow-x: scroll;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      display: flex;
      gap: 6px;
      align-items: center;
      border-bottom: 2px solid #e0e4f0;
      position: sticky;
      top: 57px;
      z-index: 90;
      cursor: grab;
    }
    .symbol-bar::-webkit-scrollbar { display: none; }
    .symbol-bar.grabbing { cursor: grabbing; }

    .bar-group { display: flex; gap: 5px; flex-shrink: 0; }
    .bar-group + .bar-group {
      margin-left: 6px;
      padding-left: 6px;
      border-left: 2px dashed #c8cce0;
    }
    .bar-chip {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid #d0d4e8;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; font-weight: 900;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
      color: var(--ink);
    }
    .bar-chip:hover { border-color: var(--primary); transform: scale(1.15); }
    .bar-chip.active {
      background: var(--primary); color: #fff;
      border-color: var(--primary);
      transform: scale(1.2);
      box-shadow: 0 4px 12px rgba(255,107,53,0.35);
    }

    /* ===== 主容器 ===== */
    main {
      flex: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      width: 100%;
    }

    /* ===== 上方：符號資訊列 ===== */
    .symbol-info {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .symbol-display {
      font-size: 5rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      animation: popIn .3s ease;
    }
    @keyframes popIn {
      0% { transform: scale(0.7); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .symbol-meta { display: flex; flex-direction: column; gap: 4px; }
    .symbol-type-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      background: var(--accent);
      color: var(--ink);
    }
    .symbol-stroke-info {
      font-size: 0.9rem;
      color: #888;
      font-weight: 700;
    }
    .symbol-nav {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    .nav-btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 2px solid #d0d4e8;
      background: var(--card);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      color: var(--ink);
    }
    .nav-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ===== 發音按鈕 ===== */
    .speak-btn {
      background: var(--secondary);
      border: none;
      border-radius: 50px;
      padding: 10px 24px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      transition: transform .15s;
    }
    .speak-btn:hover { transform: scale(1.05); }
    .speak-btn:active { transform: scale(0.95); }

    /* ===== 主學習區：兩欄 ===== */
    .learn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .learn-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #888;
      margin-bottom: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* 筆順動畫區 */
    .stroke-wrap {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #f8f8f8;
    }
    #stroke-container {
      position: absolute;
      inset: 0;
    }
    #stroke-container .overlay {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 10;
    }
    #stroke-container .overlay__backdrop { position: absolute; inset: 0; }
    #stroke-container .modal {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #stroke-container svg {
      width: 100% !important;
      height: 100% !important;
    }

    /* 描字練習區 */
    .draw-wrap {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #f8f8f8;
    }
    .draw-ghost {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.12;
      filter: sepia(1) saturate(5) hue-rotate(340deg); /* 橘色調 */
      pointer-events: none;
      padding: 8%;
    }
    #draw-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    .draw-controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: center;
    }
    .draw-btn {
      padding: 8px 20px;
      border-radius: 50px;
      border: 2px solid #d0d4e8;
      background: var(--card);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--ink);
      transition: all .15s;
    }
    .draw-btn:hover { border-color: var(--secondary); color: var(--secondary); }
    .draw-btn.primary {
      background: var(--secondary);
      color: #fff;
      border-color: var(--secondary);
    }
    .draw-btn.primary:hover { background: #3db8b0; }

    .draw-result {
      text-align: center;
      font-size: 0.9rem;
      font-weight: 700;
      min-height: 28px;
      margin-top: 8px;
      padding: 4px 12px;
      border-radius: 50px;
    }
    .draw-result.ok { background: #E8FAF9; color: #0f6e56; }
    .draw-result.no { background: #FFF5E0; color: #b45309; }

    /* ===== 例字區 ===== */
    .examples-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    }
    .examples-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }
    .example-item {
      background: var(--soft);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: transform .15s;
      border: 2px solid transparent;
    }
    .example-item:hover {
      transform: translateY(-3px);
      border-color: var(--secondary);
    }
    .ex-emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
    .ex-word  { font-size: 1.1rem; font-weight: 900; display: block; }
    .ex-note  { font-size: 0.72rem; color: #888; display: block; margin-top: 2px; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      font-size: 0.8rem;
      border-top: 1px solid #e8e8e8;
    }

    /* ===== 響應式 ===== */
    @media (max-width: 640px) {
      .learn-grid { grid-template-columns: 1fr; }
      .examples-grid { grid-template-columns: repeat(3, 1fr); }
      .symbol-display { font-size: 3.5rem; }
      .symbol-nav { display: none; }
    }
  </style>
</head>

</main>

  { char:'ㄥ', type:'韻母', strokes:2, img:'33.png', examples:[{e:'🐝',w:'嗡嗡',n:'ㄨㄥ ㄨㄥ'},{e:'🌈',w:'彩虹',n:'ㄘㄞˇ ㄏㄨㄥˊ'},{e:'🐉',w:'龍',n:'ㄌㄨㄥˊ'}] },
  { char:'ㄦ', type:'韻母', strokes:3, img:'34.png', examples:[{e:'👂',w:'耳朵',n:'ㄦˇ ㄉㄨㄛ'},{e:'🍀',w:'兒子',n:'ㄦˊ ㄗ'},{e:'🎪',w:'而且',n:'ㄦˊ ㄑㄧㄝˇ'}] },
  { char:'ㄧ', type:'韻母', strokes:1, img:'35.png', examples:[{e:'1️⃣',w:'一',n:'ㄧ'},{e:'🪑',w:'椅子',n:'ㄧˇ ㄗ'},{e:'🩺',w:'醫生',n:'ㄧ ㄕㄥ'}] },
  { char:'ㄨ', type:'韻母', strokes:1, img:'36.png', examples:[{e:'🐸',w:'青蛙',n:'ㄑㄧㄥ ㄨㄚ'},{e:'🐷',w:'豬',n:'ㄓㄨ'},{e:'🏡',w:'屋子',n:'ㄨ ㄗ'}] },
  { char:'ㄩ', type:'韻母', strokes:2, img:'37.png', examples:[{e:'🐠',w:'魚',n:'ㄩˊ'},{e:'🌧️',w:'雨',n:'ㄩˇ'},{e:'🌕',w:'月亮',n:'ㄩㄝˋ ㄌㄧㄤˋ'}] },
];

const CONSONANTS = ALL_SYMBOLS.filter(s => s.type === '聲母');
const VOWELS     = ALL_SYMBOLS.filter(s => s.type === '韻母');

// ===== 狀態 =====
let currentIndex = 0;

// ===== 符號列建立 =====
function buildBar() {
  const bc = document.getElementById('bar-consonant');
  const bv = document.getElementById('bar-vowel');
  ALL_SYMBOLS.forEach((sym, idx) => {
    const chip = document.createElement('div');
    chip.className = 'bar-chip';
    chip.textContent = sym.char;
    chip.dataset.index = idx;
    chip.addEventListener('click', () => goTo(idx));
    (sym.type === '聲母' ? bc : bv).appendChild(chip);
  });
}

function updateBar() {
  document.querySelectorAll('.bar-chip').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.index) === currentIndex);
  });
  const chip = document.querySelector(`.bar-chip[data-index="${currentIndex}"]`);
  if (chip) chip.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

// ===== 跳到指定符號 =====
function goTo(idx) {
  currentIndex = (idx + ALL_SYMBOLS.length) % ALL_SYMBOLS.length;
  render();
  updateBar();
}

// ===== 主渲染 =====
function render() {
  const sym = ALL_SYMBOLS[currentIndex];

  // 符號資訊
  const charEl = document.getElementById('sym-char');
  charEl.textContent = sym.char;
  charEl.style.animation = 'none';
  requestAnimationFrame(() => charEl.style.animation = '');

  document.getElementById('sym-type').textContent = sym.type;
  document.getElementById('sym-stroke').textContent = `${sym.strokes} 畫`;

  // 筆順動畫
  const sc = document.getElementById('stroke-container');
  if (window.ReactDOM && ReactDOM.unmountComponentAtNode) {
    ReactDOM.unmountComponentAtNode(sc);
  } else {
    sc.innerHTML = '';
  }
  setTimeout(() => zhStroker('stroke-container', sym.char), 50);

  // 描字底稿
  document.getElementById('draw-ghost').src = `images/${sym.img}`;

  // 清除畫布
  clearCanvas();

  // 例字
  document.getElementById('examples-title').textContent = `📖 ${sym.char} 的例字`;
  const grid = document.getElementById('examples-grid');
  grid.innerHTML = sym.examples.map(ex => `
    <div class="example-item" onclick="speak('${ex.w}')">
      <span class="ex-emoji">${ex.e}</span>
      <span class="ex-word">${ex.w}</span>
      <span class="ex-note">${ex.n}</span>
    </div>
  `).join('');
}

// ===== 音效 =====
let voices = [];
function loadVoices() { voices = speechSynthesis.getVoices(); }
if (window.speechSynthesis) {
  loadVoices();
  speechSynthesis.addEventListener('voiceschanged', loadVoices);
}

const audioCache = {};
function speak(text) {
  const sym = ALL_SYMBOLS[currentIndex];
  const isSingleSymbol = text === sym.char;
  if (isSingleSymbol) {
    const path = `audio/${text}.mp3`;
    if (!audioCache[text]) audioCache[text] = new Audio(path);
    const a = audioCache[text];
    a.currentTime = 0;
    a.play().catch(() => speakTTS(text));
  } else {
    speakTTS(text);
  }
}

function speakTTS(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW'; u.rate = 0.75;
  const v = voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
  if (v) u.voice = v;
  setTimeout(() => speechSynthesis.speak(u), 50);
}

// ===== Canvas 描字 =====
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
let drawing = false, strokes = [], cur = [];

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);

function pos(e) {
  const r = canvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return { x: s.clientX - r.left, y: s.clientY - r.top };
}

ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#4ECDC4';

canvas.addEventListener('mousedown', e => { drawing=true; cur=[]; const p=pos(e); cur.push(p); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('mousemove', e => { if(!drawing)return; const p=pos(e); cur.push(p); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('mouseup',    () => { drawing=false; if(cur.length>2) strokes.push([...cur]); });
canvas.addEventListener('mouseleave', () => { drawing=false; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; cur=[]; const p=pos(e); cur.push(p); ctx.beginPath(); ctx.moveTo(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove',  e => { e.preventDefault(); if(!drawing)return; const p=pos(e); cur.push(p); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchend',   () => { drawing=false; if(cur.length>2) strokes.push([...cur]); });

function clearCanvas() {
  resizeCanvas();
  strokes = []; cur = [];
  document.getElementById('draw-result').textContent = '';
  document.getElementById('draw-result').className = 'draw-result';
}

function checkStroke() {
  const res = document.getElementById('draw-result');
  const sym = ALL_SYMBOLS[currentIndex];
  if (!strokes.length) { res.className='draw-result no'; res.textContent='還沒有畫喔！'; return; }
  const flat = strokes.flat();
  const xs = flat.map(p=>p.x), ys = flat.map(p=>p.y);
  const w = Math.max(...xs)-Math.min(...xs);
  const h = Math.max(...ys)-Math.min(...ys);
  const coverage = (w * h) / (canvas.width * canvas.height);
  if (flat.length < 20 || coverage < 0.05) {
    res.className='draw-result no'; res.textContent='再試試看，畫大一點 ✏️'; return;
  }
  if (strokes.length > sym.strokes + 1) {
    res.className='draw-result no'; res.textContent=`ㄅ 只有 ${sym.strokes} 畫，筆畫太多了喔`; return;
  }
  res.className='draw-result ok'; res.textContent='✓ 很棒！寫得很好！';
}

// ===== 按鈕事件 =====
document.getElementById('speak-btn').addEventListener('click', () => speak(ALL_SYMBOLS[currentIndex].char));
document.getElementById('prev-btn').addEventListener('click', () => goTo(currentIndex - 1));
document.getElementById('next-btn').addEventListener('click', () => goTo(currentIndex + 1));
document.getElementById('clear-btn').addEventListener('click', clearCanvas);
document.getElementById('check-btn').addEventListener('click', checkStroke);

// ===== 符號列慣性拖拉 =====
const bar = document.querySelector('.symbol-bar');
let isDragging=false, startX=0, scrollLeft=0, velX=0, lastX=0, lastTime=0, rafId=null;
function stopInertia() { if(rafId){cancelAnimationFrame(rafId);rafId=null;} }
function applyInertia() { velX*=0.92; if(Math.abs(velX)<0.5)return; bar.scrollLeft-=velX; rafId=requestAnimationFrame(applyInertia); }
bar.addEventListener('mousedown', e=>{ stopInertia(); isDragging=true; startX=e.pageX-bar.offsetLeft; scrollLeft=bar.scrollLeft; lastX=e.pageX; lastTime=Date.now(); velX=0; bar.classList.add('grabbing'); });
bar.addEventListener('mousemove', e=>{ if(!isDragging)return; e.preventDefault(); const now=Date.now(),dx=e.pageX-lastX,dt=now-lastTime||1; velX=dx/dt*16; lastX=e.pageX; lastTime=now; bar.scrollLeft=scrollLeft-(e.pageX-bar.offsetLeft-startX); });
function endDrag(){ if(!isDragging)return; isDragging=false; bar.classList.remove('grabbing'); rafId=requestAnimationFrame(applyInertia); }
bar.addEventListener('mouseup', endDrag);
bar.addEventListener('mouseleave', endDrag);

// ===== URL 參數 =====
function initFromURL() {
  const s = new URLSearchParams(location.search).get('s');
  if (s) {
    const idx = ALL_SYMBOLS.findIndex(sym => sym.char === s);
    if (idx >= 0) currentIndex = idx;
  }
}

// ===== 啟動 =====
initFromURL();
buildBar();
render();
updateBar();
</script>
