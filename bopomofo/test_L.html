<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<title>ㄌ 修正測試</title>
<style>
body { font-family: sans-serif; background:#FFF9F0; display:flex; flex-direction:column; align-items:center; padding:32px; gap:20px; }
h2 { color:#FF6B35; }
.panels { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
.panel { background:#fff; border-radius:16px; padding:20px; box-shadow:0 4px 16px rgba(0,0,0,0.08); display:flex; flex-direction:column; align-items:center; gap:12px; }
.label { font-size:0.85rem; font-weight:700; color:#888; }
button { padding:8px 20px; border-radius:50px; border:2px solid #FF6B35; background:#fff; color:#FF6B35; font-weight:700; cursor:pointer; }
button:hover { background:#FF6B35; color:#fff; }
.result { font-size:0.9rem; font-weight:700; padding:6px 14px; border-radius:50px; min-height:28px; }
.ok { background:#E8FAF9; color:#0f6e56; }
.no { background:#FFF5E0; color:#b45309; }
</style>
</head>
<body>
<h2>ㄌ 修正後測試</h2>
<p style="color:#888;font-size:0.85rem;">左：動畫示範　右：描字練習</p>

<div class="panels">
  <div class="panel">
    <div class="label">✍️ 動畫示範</div>
    <div id="anim-target"></div>
    <button onclick="animWriter.animateCharacter()">▶ 播放</button>
  </div>
  <div class="panel">
    <div class="label">🖌️ 描字練習</div>
    <div id="quiz-target"></div>
    <div class="result" id="result"></div>
    <button onclick="resetQuiz()">↺ 重試</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script>
const CHAR_DATA = {"strokes": ["M 542 505 Q 536 509 542 526 Q 552 593 575 620 Q 594 642 591 654 Q 573 696 505 707 Q 492 710 489 705 Q 485 701 490 693 Q 517 636 472 499 L 449 420 Q 385 269 340 181 Q 306 117 257 49 Q 244 33 250 25 Q 259 21 298 60 Q 379 147 468 325 Q 490 373 505 416 C 515 444 542 492 542 505 Z", "M 353 472 Q 329 469 340 490 Q 352 521 366 537 Q 378 547 374 561 Q 370 573 357 578 Q 314 603 287 605 Q 277 606 274 601 Q 271 597 284 579 Q 315 528 261 458 Q 254 452 248 452 Q 218 455 222 416 Q 223 398 238 390 Q 254 380 285 398 Q 351 440 446 450 L 648 468 Q 660 468 674 468 Q 690 468 701 459 Q 716 449 710 396 Q 688 207 634 110 Q 612 70 584 69 Q 562 70 503 96 Q 484 105 479 98 Q 475 94 491 76 Q 549 21 553 0 Q 556 -22 572 -22 Q 608 -22 661 47 Q 728 134 770 397 Q 776 430 791 436 Q 807 445 808 456 Q 808 472 795 486 Q 740 544 720 543 Q 704 543 695 533 Q 688 526 677 521 Q 608 508 559 500 L 353 472 Z"], "medians": [[[505, 700], [490, 650], [472, 580], [449, 480], [420, 380], [380, 260], [330, 150], [290, 70], [260, 30]], [[280, 580], [350, 560], [450, 530], [560, 510], [650, 510], [710, 490], [750, 450], [710, 300], [670, 150], [630, 60], [560, 0]]]};

function loader(char, onLoad, onError) {
  onLoad(CHAR_DATA);
}

const OPTS = {
  width: 280, height: 280, padding: 8,
  strokeWidth: 32, showOutline: true,
  outlineColor: '#d8d0c8',
  charDataLoader: loader,
};

const animWriter = HanziWriter.create('anim-target', 'ㄌ', {
  ...OPTS, strokeColor: '#FF6B35',
  strokeAnimationSpeed: 0.48, delayBetweenStrokes: 800,
});

let quizWriter = HanziWriter.create('quiz-target', 'ㄌ', {
  ...OPTS, showCharacter: false, strokeColor: '#4ECDC4',
  drawingColor: '#4ECDC4', drawingWidth: 72,
});

function startQuiz() {
  quizWriter.quiz({
    onMistake: (d) => { const r=document.getElementById('result'); r.className='result no'; r.textContent=`第${d.strokeNum+1}畫再試試 ✏️`; },
    onCorrectStroke: (d) => { const r=document.getElementById('result'); r.className='result ok'; r.textContent=`第${d.strokeNum+1}畫正確！`; },
    onComplete: () => { const r=document.getElementById('result'); r.className='result ok'; r.textContent='✓ 完成！'; },
  });
}

function resetQuiz() {
  document.getElementById('result').textContent='';
  document.getElementById('result').className='result';
  quizWriter.cancelQuiz();
  startQuiz();
}

setTimeout(() => { animWriter.animateCharacter(); startQuiz(); }, 300);
</script>
</body>
</html>
