<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加減綜合 ✖️ 數學樂園</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0FF;--primary:#A855F7;--primary-dark:#7C3AED;--accent:#FFE66D;--orange:#FF6B35;--teal:#4ECDC4;--ink:#1A1A2E;--card-radius:24px;--shadow:0 8px 32px rgba(0,0,0,0.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 25%,#A855F722 0%,transparent 45%),radial-gradient(circle at 85% 75%,#FFE66D33 0%,transparent 45%);pointer-events:none;z-index:0;}
header{position:relative;z-index:10;padding:20px 32px;display:flex;align-items:center;}
.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--ink);text-decoration:none;font-weight:700;font-size:15px;padding:8px 16px;background:white;border-radius:50px;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:transform 0.15s;}
.back-link:hover{transform:translateY(-2px);}
.back-link::before{content:'←';font-size:18px;}
.page{display:none;position:relative;z-index:1;flex:1;width:100%;max-width:760px;margin:0 auto;padding:0 24px 60px;flex-direction:column;align-items:center;gap:24px;}
.page.active{display:flex;}
.welcome-cover img{width:100%;height:auto;display:block;object-fit:contain;} .welcome-cover img{width:100%;height:auto;display:block;object-fit:contain;}
.welcome-cover{width:100%;border-radius:var(--card-radius);overflow:hidden;box-shadow:var(--shadow);background:linear-gradient(135deg,#7C3AED,#A855F7,#FF6B35);display:flex;align-items:center;justify-content:center;gap:16px;}
.welcome-cover .cover-placeholder{font-size:64px;animation:float 3s ease-in-out infinite;}
.welcome-cover .cover-placeholder:nth-child(2){animation-delay:0.5s;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.welcome-title{font-size:clamp(28px,6vw,48px);font-weight:900;background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
.welcome-desc{font-size:16px;color:#666;font-weight:700;text-align:center;line-height:1.6;}
.learn-link{display:block;width:100%;padding:14px;border-radius:16px;border:2.5px dashed #A855F7;background:white;color:#7C3AED;font-family:"Nunito",sans-serif;font-size:16px;font-weight:800;text-align:center;text-decoration:none;cursor:pointer;transition:all 0.15s;} .learn-link:hover{background:#F3E8FF;border-style:solid;} .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;}
.mode-card{background:white;border-radius:20px;padding:28px 20px;text-align:center;cursor:pointer;border:3px solid transparent;box-shadow:var(--shadow);transition:transform 0.2s;}
.mode-card:hover{transform:translateY(-4px);}
.mode-card.practice{border-color:var(--primary);}
.mode-card.challenge{border-color:var(--orange);}
.mode-icon{font-size:40px;margin-bottom:10px;}
.mode-title{font-size:20px;font-weight:900;margin-bottom:6px;}
.mode-desc{font-size:13px;color:#888;font-weight:700;line-height:1.5;}
.setup-card{background:white;border-radius:var(--card-radius);box-shadow:var(--shadow);padding:36px 28px;width:100%;}
.setup-title{font-size:22px;font-weight:900;margin-bottom:24px;text-align:center;}
.setup-section{margin-bottom:24px;}
.setup-label{font-size:13px;font-weight:800;letter-spacing:2px;color:#aaa;text-transform:uppercase;margin-bottom:12px;}
.option-row{display:flex;gap:10px;flex-wrap:wrap;}
.opt-btn{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;padding:10px 20px;border-radius:50px;border:2.5px solid #e5e5e5;background:white;color:var(--ink);cursor:pointer;transition:all 0.15s;}
.opt-btn:hover{border-color:var(--primary);background:#F3E8FF;}
.opt-btn.selected{background:var(--primary);border-color:var(--primary);color:white;}
.start-btn{font-family:'Nunito',sans-serif;width:100%;padding:18px;border-radius:16px;border:none;font-size:20px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 4px 16px rgba(168,85,247,0.4);transition:transform 0.15s;}
.start-btn:hover{transform:translateY(-2px);}
.start-btn.orange{background:linear-gradient(135deg,var(--orange),#C2410C);box-shadow:0 4px 16px rgba(255,107,53,0.4);}
.game-topbar{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.level-badge{font-weight:900;font-size:14px;padding:5px 14px;border-radius:50px;background:var(--primary);color:white;white-space:nowrap;}
.level-badge.orange{background:var(--orange);}
.op-badge{font-weight:900;font-size:14px;padding:5px 14px;border-radius:50px;background:white;border:2px solid var(--primary);color:var(--primary-dark);white-space:nowrap;}
.streak-display{font-weight:800;font-size:14px;color:#888;white-space:nowrap;}
.streak-display span{color:var(--orange);}
.skip-btn{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:6px 14px;border-radius:50px;border:2px solid #ddd;background:white;color:#aaa;cursor:pointer;transition:all 0.15s;}
.skip-btn:hover{border-color:#EF4444;color:#EF4444;}
.xp-bar-wrap{width:100%;background:#e5e5e5;border-radius:50px;height:12px;overflow:hidden;}
.xp-bar{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.nav-strip{width:100%;display:flex;flex-wrap:wrap;gap:6px;}
.nav-dot{width:32px;height:32px;border-radius:8px;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;background:#e5e5e5;color:#aaa;cursor:pointer;transition:all 0.15s;border:2px solid transparent;}
.nav-dot.current{border-color:var(--primary-dark);background:white;color:var(--primary-dark);}
.nav-dot.answered{background:#22C55E;color:white;}
.nav-dot.skipped{background:#EF4444;color:white;}
.question-card{width:100%;background:white;border-radius:var(--card-radius);box-shadow:var(--shadow);padding:36px 28px;text-align:center;}
.question-label{font-size:13px;font-weight:800;letter-spacing:2px;color:#bbb;text-transform:uppercase;margin-bottom:20px;}
.visual-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;min-height:60px;}
.visual-group{display:flex;flex-wrap:wrap;gap:4px;max-width:200px;justify-content:center;background:#F8F5FF;border-radius:12px;padding:8px;}
.visual-emoji{font-size:22px;line-height:1;transition:all .4s;}
.visual-emoji.removed{opacity:.15;filter:grayscale(1);transform:scale(.85);}
.op-sym{font-size:36px;font-weight:900;color:var(--primary);}
.equation{font-size:clamp(30px,7vw,52px);font-weight:900;letter-spacing:3px;}
.equation .num{color:var(--primary-dark);}
.equation .op-add{color:var(--teal);margin:0 6px;}
.equation .op-sub{color:var(--orange);margin:0 6px;}
.equation .blank{display:inline-block;min-width:56px;border-bottom:4px solid var(--ink);color:transparent;}
.options-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;}
.option-btn{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;padding:18px 8px;border:3px solid #EDE9FF;border-radius:18px;background:white;color:var(--ink);cursor:pointer;transition:transform 0.15s,background 0.15s,border-color 0.15s;box-shadow:0 4px 0 #c4b5fd;}
.option-btn:hover:not(:disabled){transform:translateY(-3px);background:#F3E8FF;border-color:var(--primary);}
.option-btn.selected{background:#F3E8FF;border-color:var(--primary-dark);box-shadow:0 4px 0 var(--primary);}
.option-btn.correct{background:#22C55E;color:white;border-color:#16A34A;box-shadow:0 4px 0 #15803D;animation:bounce 0.4s;}
.option-btn.wrong-sel{background:#EF4444;color:white;border-color:#DC2626;box-shadow:0 4px 0 #B91C1C;animation:shake 0.4s;}
.option-btn:disabled{cursor:default;}
.confirm-btn{font-family:'Nunito',sans-serif;width:100%;padding:16px;border-radius:16px;border:none;font-size:18px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;opacity:0.35;pointer-events:none;transition:opacity 0.2s,transform 0.15s;}
.confirm-btn.ready{opacity:1;pointer-events:auto;}
.confirm-btn.ready:hover{transform:translateY(-2px);}
.prev-btn{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;padding:8px 18px;border-radius:50px;border:2px solid #ddd;background:white;color:#888;cursor:pointer;transition:all 0.15s;align-self:flex-start;}
.prev-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary-dark);}
.prev-btn:disabled{opacity:0.3;cursor:default;}
.feedback{font-size:20px;font-weight:900;height:32px;text-align:center;}
.feedback.correct-msg{color:#22C55E;}
.feedback.wrong-msg{color:#EF4444;}
.exp-pop{position:fixed;pointer-events:none;z-index:999;font-size:22px;font-weight:900;color:var(--primary-dark);animation:exp-fly 1s ease-out forwards;}
@keyframes exp-fly{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(1.3);opacity:0}}
.particle{position:fixed;pointer-events:none;font-size:26px;z-index:999;animation:particle-fly 1s ease-out forwards;}
@keyframes particle-fly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0}}
.level-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--accent);padding:12px 28px;border-radius:50px;font-weight:900;font-size:16px;z-index:100;animation:toast-in 0.3s ease,toast-out 0.3s ease 1.7s forwards;pointer-events:none;}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toast-out{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}
.result-card{width:100%;background:white;border-radius:var(--card-radius);box-shadow:var(--shadow);padding:40px 28px;text-align:center;}
.result-emoji{font-size:72px;margin-bottom:12px;animation:bounce 0.6s;}
.result-score{font-size:clamp(48px,10vw,80px);font-weight:900;color:var(--primary-dark);}
.result-label{font-size:16px;color:#aaa;font-weight:700;margin-bottom:8px;}
.result-msg{font-size:20px;font-weight:900;color:var(--ink);margin:12px 0 28px;}
.wrong-list{width:100%;text-align:left;}
.wrong-list-title{font-size:13px;font-weight:800;letter-spacing:2px;color:#aaa;text-transform:uppercase;margin-bottom:12px;}
.wrong-item{background:#FFF5F5;border-radius:12px;padding:12px 16px;margin-bottom:8px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.wi-eq{color:var(--ink);}
.wi-your{color:#EF4444;}
.wi-skip{color:#aaa;font-style:italic;}
.result-actions{display:flex;gap:12px;width:100%;}
.result-btn{font-family:'Nunito',sans-serif;flex:1;padding:16px;border-radius:16px;border:none;font-size:17px;font-weight:900;cursor:pointer;transition:transform 0.15s;}
.result-btn:hover{transform:translateY(-2px);}
.result-btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;}
.result-btn.secondary{background:white;border:2.5px solid #ddd;color:var(--ink);}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
footer{position:relative;z-index:1;text-align:center;padding:20px;font-size:13px;color:#bbb;font-weight:700;}
@media(max-width:480px){.mode-grid{grid-template-columns:1fr}.options-grid{gap:8px}.option-btn{font-size:20px;padding:14px 4px}.equation{font-size:26px}.nav-dot{width:26px;height:26px;font-size:11px}}
+/* ── 平板與手機遊玩最佳化 ── */
html{touch-action:pan-x pan-y;}
button,a{touch-action:manipulation;}
.fullscreen-btn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:2px solid rgba(0,0,0,.08);border-radius:999px;background:#fff;color:var(--ink);font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.fullscreen-btn:hover{transform:translateY(-2px);}
:fullscreen{overflow:hidden;}
:fullscreen body{min-height:100dvh;}
@media (orientation:landscape) and (min-width:900px){
  body:has(#page-practice.active) footer,body:has(#page-challenge.active) footer{display:none;}
  body:has(#page-practice.active) header,body:has(#page-challenge.active) header{padding-block:10px;}
  #page-practice.active,#page-challenge.active{display:grid;width:min(1200px,100%);max-width:1200px;height:calc(100dvh - 64px);min-height:560px;padding:8px 24px 16px;gap:12px 24px;overflow:hidden;align-items:stretch;grid-template-columns:minmax(0,3fr) minmax(340px,2fr);grid-template-rows:auto auto minmax(0,1fr) auto auto;}
  #page-practice.active{grid-template-areas:'top top' 'nav nav' 'question opts' 'question feedback' 'question confirm';}
  #page-challenge.active{grid-template-areas:'top top' 'nav nav' 'question opts' 'question prev' 'question confirm';}
  #page-practice>.game-topbar,#page-challenge>.game-topbar{grid-area:top;}
  #page-practice>.xp-bar-wrap,#page-challenge>.nav-strip{grid-area:nav;margin:0;}
  #page-practice>.question-card,#page-challenge>.question-card{grid-area:question;height:100%;min-height:0;display:flex;flex-direction:column;justify-content:center;margin:0;overflow:hidden;}
  #page-practice>.feedback{grid-area:feedback;margin:0;align-self:end;}
  #page-practice>.options-grid,#page-challenge>.options-grid{grid-area:opts;align-self:center;margin:0;}
  #page-practice>.confirm-btn,#page-challenge>.confirm-btn{grid-area:confirm;align-self:end;margin:0;}
  #page-challenge>.prev-btn{grid-area:prev;align-self:end;margin:0;}
  .question-card{padding:20px 24px;}
  .visual-row,.emoji-display,.shape-display{min-height:0;}
}
@media (orientation:portrait) and (max-width:900px){
  header{padding:12px 16px;}
  .page{max-width:760px;padding:0 16px 28px;gap:14px;}
  #page-practice.active,#page-challenge.active{padding-bottom:24px;}
  .question-card{padding:22px 18px;}
  .question-label{margin-bottom:10px;}
  .feedback{height:28px;font-size:18px;}
  .confirm-btn{padding:15px;}
}
@media (max-height:700px) and (orientation:landscape){
  #page-practice.active,#page-challenge.active{height:calc(100dvh - 54px);min-height:0;gap:8px 18px;padding-block:4px 10px;}
  .game-topbar{min-height:36px;}
  .question-card{padding:14px 18px;}
  .question-label{margin-bottom:6px;}
  .feedback{height:26px;font-size:17px;}
  .option-btn{padding-block:12px;}
  .confirm-btn{padding:13px;}
}
@media (max-width:600px){
  .fullscreen-btn span{display:none;}
  .fullscreen-btn{padding:8px 11px;}
  .game-topbar{gap:8px;}
  .question-card{padding:18px 14px;}
}
</style>
</head>
<body>
<header><a href="index.html" class="back-link">數學樂園</a><button class="fullscreen-btn" type="button" onclick="toggleFullscreen()" aria-label="切換全螢幕">⛶ <span>全螢幕遊玩</span></button></header>

<!-- 歡迎頁 -->
<div class="page active" id="page-welcome">
  <div class="welcome-cover"><img src="./mixed.png" alt="加減綜合"></div>
  <div class="welcome-title">加減綜合挑戰</div>
  <div class="welcome-desc">加法和減法混在一起，你準備好了嗎？🔥<br>選擇你的練習模式吧！</div>
  <a href="learn-mixed.html" class="learn-link">📖 先看教學，再來玩！</a>
  <div class="mode-grid">
    <div class="mode-card practice" onclick="showPage('page-practice-setup')">
      <div class="mode-icon">📖</div><div class="mode-title">練習模式</div>
      <div class="mode-desc">無限題庫<br>累積 EXP 經驗值<br>隨時切換難度</div>
    </div>
    <div class="mode-card challenge" onclick="showPage('page-challenge-setup')">
      <div class="mode-icon">🏆</div><div class="mode-title">挑戰模式</div>
      <div class="mode-desc">固定題數作答<br>最後統一結算<br>挑戰滿分 100 分</div>
    </div>
  </div>
</div>

<!-- 練習設定頁 -->
<div class="page" id="page-practice-setup">
  <div class="setup-card">
    <div class="setup-title">📖 練習模式設定</div>
    <div class="setup-section">
      <div class="setup-label">難度模式</div>
      <div class="option-row" id="p-diff-mode">
        <button class="opt-btn selected" data-val="auto" onclick="selectOpt(this,'p-diff-mode')">🚀 自動升級</button>
        <button class="opt-btn" data-val="fixed" onclick="selectOpt(this,'p-diff-mode')">📌 固定難度</button>
      </div>
    </div>
    <div class="setup-section" id="p-fixed-lv-wrap" style="display:none">
      <div class="setup-label">選擇難度</div>
      <div class="option-row" id="p-fixed-lv">
        <button class="opt-btn selected" data-val="0" onclick="selectOpt(this,'p-fixed-lv')">Lv 1</button>
        <button class="opt-btn" data-val="1" onclick="selectOpt(this,'p-fixed-lv')">Lv 2</button>
        <button class="opt-btn" data-val="2" onclick="selectOpt(this,'p-fixed-lv')">Lv 3</button>
        <button class="opt-btn" data-val="3" onclick="selectOpt(this,'p-fixed-lv')">Lv 4</button>
        <button class="opt-btn" data-val="4" onclick="selectOpt(this,'p-fixed-lv')">Lv 5</button>
      </div>
    </div>
    <button class="start-btn" onclick="startPractice()">開始練習 🚀</button>
  </div>
  <button class="prev-btn" onclick="showPage('page-welcome')">← 返回</button>
</div>

<!-- 挑戰設定頁 -->
<div class="page" id="page-challenge-setup">
  <div class="setup-card">
    <div class="setup-title">🏆 挑戰模式設定</div>
    <div class="setup-section">
      <div class="setup-label">難度</div>
      <div class="option-row" id="c-diff">
        <button class="opt-btn selected" data-val="0" onclick="selectOpt(this,'c-diff')">Lv 1</button>
        <button class="opt-btn" data-val="1" onclick="selectOpt(this,'c-diff')">Lv 2</button>
        <button class="opt-btn" data-val="2" onclick="selectOpt(this,'c-diff')">Lv 3</button>
        <button class="opt-btn" data-val="3" onclick="selectOpt(this,'c-diff')">Lv 4</button>
        <button class="opt-btn" data-val="4" onclick="selectOpt(this,'c-diff')">Lv 5</button>
<button class="opt-btn" data-val="auto" onclick="selectOpt(this,'c-diff')">🚀 漸進挑戰</button>
      </div>
    </div>
    <div class="setup-section">
      <div class="setup-label">題目數</div>
      <div class="option-row" id="c-count">
        <button class="opt-btn selected" data-val="10" onclick="selectOpt(this,'c-count')">10 題</button>
        <button class="opt-btn" data-val="25" onclick="selectOpt(this,'c-count')">25 題</button>
      </div>
    </div>
    <button class="start-btn orange" onclick="startChallenge()">開始挑戰 🏆</button>
  </div>
  <button class="prev-btn" onclick="showPage('page-welcome')">← 返回</button>
</div>

<!-- 練習遊戲頁 -->
<div class="page" id="page-practice">
  <div class="game-topbar">
    <div class="level-badge" id="p-lv-badge">Lv 1</div>
    <div class="op-badge" id="p-op-badge">➕ 加法</div>
    <div class="streak-display">連答 <span id="p-streak">0</span> 題 🔥</div>
    <button class="skip-btn" onclick="practiceSkip()">跳過</button>
  </div>
  <div class="xp-bar-wrap" id="p-xp-wrap"><div class="xp-bar" id="p-xp-bar" style="width:0%"></div></div>
  <div class="question-card">
    <div class="question-label" id="p-q-label">計算看看！</div>
    <div class="visual-row" id="p-visual"></div>
    <div class="equation" id="p-eq"></div>
  </div>
  <div class="feedback" id="p-fb"></div>
  <div class="options-grid" id="p-opts"></div>
  <button class="confirm-btn" id="p-confirm" onclick="practiceConfirm()">確認作答</button>
</div>

<!-- 挑戰遊戲頁 -->
<div class="page" id="page-challenge">
  <div class="game-topbar">
    <div class="level-badge orange" id="c-lv-badge">Lv 1</div>
    <div class="streak-display" id="c-progress">第 1 / 10 題</div>
    <button class="skip-btn" onclick="challengeSkip()">跳過</button>
  </div>
  <div class="nav-strip" id="c-nav"></div>
  <div class="question-card">
    <div class="question-label" id="c-q-label">計算看看！</div>
    <div class="visual-row" id="c-visual"></div>
    <div class="equation" id="c-eq"></div>
  </div>
  <button class="prev-btn" id="c-prev" onclick="challengePrev()">← 上一題</button>
  <div class="options-grid" id="c-opts"></div>
  <button class="confirm-btn" id="c-confirm" onclick="challengeConfirm()">確認作答</button>
</div>

<!-- 結算頁 -->
<div class="page" id="page-result">
  <div class="result-card">
    <div class="result-emoji" id="r-emoji">🏆</div>
    <div class="result-label">最終得分</div>
    <div class="result-score" id="r-score">100</div>
    <div class="result-msg" id="r-msg"></div>
    <div class="wrong-list" id="r-wrong"></div>
  </div>
  <div class="result-actions">
    <button class="result-btn secondary" onclick="showPage('page-welcome')">回主頁</button>
    <button class="result-btn primary" onclick="showPage('page-challenge-setup')">再挑戰一次</button>
  </div>
</div>

<footer>➕➖ 加減綜合關卡</footer>

<script>
// 加法設定
const AUDIO_BASE="./audio/";let currentAudio=null;function playAudio(path,onEnd){if(currentAudio){currentAudio.pause();currentAudio=null;}const a=new Audio(AUDIO_BASE+path);currentAudio=a;const done=()=>{if(currentAudio===a)currentAudio=null;if(onEnd)onEnd();};a.onended=done;a.onerror=done;a.play().catch(done);return a;}function playSeq(paths,onDone){if(!paths.length){if(onDone)onDone();return;}const[first,...rest]=paths;playAudio(first,()=>playSeq(rest,onDone));}function playQuestionVO(q){if(q&&q.lv>=2){const op=q.op==="+"?"operators/plus.mp3":"operators/minus.mp3";playSeq(["numbers/"+q.a+".mp3",op,"numbers/"+q.b+".mp3","operators/equals.mp3","operators/question.mp3"]);}else playAudio(q&&q.op==="+"?"mixed/question_add.mp3":"mixed/question_sub.mp3");}function playNumberVO(n){playAudio("numbers/"+ n +".mp3");}function playCorrectVO(q,onEnd){playAudio("sfx/correct_"+(Math.floor(Math.random()*3)+1)+".wav",onEnd);}function playWrongVO(onEnd){playAudio("sfx/wrong_"+(Math.floor(Math.random()*3)+1)+".wav",onEnd);}function playSkipVO(onEnd){playAudio("sfx/skip.wav",onEnd);}function playLevelUpVO(){playAudio("common/levelup.mp3");}function playLevelDownVO(){playAudio("common/leveldown.mp3");}const ADD_LV=[{aMax:4,sumMax:5},{aMax:9,sumMax:10},{aMax:19,sumMax:20},{aMax:25,sumMax:50},{aMax:50,sumMax:100}];
// 減法設定
const SUB_LV=[{max:5},{max:10},{max:20},{max:50},{max:100}];
const XP_NEEDED=[5,8,12,15];
const EMOJIS=['🍎','🍊','🍋','🐶','⭐','🌸','🎈','🦋','🍓','🐸'];

let PS={},CS={};

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function selectOpt(btn,gid){document.querySelectorAll('#'+gid+' .opt-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');if(gid==='p-diff-mode')document.getElementById('p-fixed-lv-wrap').style.display=btn.dataset.val==='fixed'?'':'none';}
function getSelected(gid){const b=document.querySelector('#'+gid+' .opt-btn.selected');return b?b.dataset.val:null;}

function playOK(onEnd){playCorrectVO(PS.q,onEnd);}
function playNG(onEnd){playWrongVO(onEnd);}
function spawnParticles(){for(let i=0;i<7;i++){const el=document.createElement('div');el.className='particle';el.textContent=['⭐','🎉','✨','🌟','🎊'][Math.floor(Math.random()*5)];el.style.left=(20+Math.random()*60)+'vw';el.style.top=(30+Math.random()*40)+'vh';el.style.setProperty('--dx',(Math.random()*180-90)+'px');el.style.setProperty('--dy',(-70-Math.random()*100)+'px');document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}}
function spawnExp(){const el=document.createElement('div');el.className='exp-pop';el.textContent='+EXP';el.style.cssText='left:50%;top:50%;transform:translateX(-50%)';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
function showToast(msg,isUp){if(isUp)playLevelUpVO();else playLevelDownVO();_showToast(msg);}function _showToast(msg){const t=document.createElement('div');t.className='level-toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

/* 隨機產加法或減法題目 */
function genQ(lv){
  const isAdd=Math.random()<0.5;
  if(isAdd){
    const cfg=ADD_LV[lv];let a,b,tries=0;
    do{a=Math.floor(Math.random()*cfg.aMax)+1;const bMax=Math.min(cfg.aMax,cfg.sumMax-a);if(bMax<1){tries++;continue;}b=Math.floor(Math.random()*bMax)+1;tries++;}while(tries<200&&lv===2&&(a%10+b%10>=10));
    return{a,b,op:'+',answer:a+b,lv};
  } else {
    const cfg=SUB_LV[lv];let a,b,tries=0;
    do{a=Math.floor(Math.random()*(cfg.max-1))+2;b=Math.floor(Math.random()*(a-1))+1;tries++;}while(tries<200&&lv===2&&(a%10<b%10));
    return{a,b,op:'-',answer:a-b,lv};
  }
}

function genOpts(correct,lv){
  const max=Math.max(ADD_LV[lv].sumMax,SUB_LV[lv].max);
  const s=new Set([correct]);let att=0;
  while(s.size<3&&att<100){const d=Math.floor(Math.random()*5)+1,sg=Math.random()<0.5?1:-1,c=correct+sg*d;if(c>=1&&c<=max&&c!==correct)s.add(c);att++;}
  let f=1;while(s.size<3&&f<=max){if(!s.has(f))s.add(f);f++;}
  return[...s].sort(()=>Math.random()-0.5);
}

function renderEq(q,eid,labelId){
  const opClass=q.op==='+'?'op-add':'op-sub';
  const opSym=q.op==='+'?'+':'−';
  document.getElementById(eid).innerHTML=`<span class="num">${q.a}</span><span class="${opClass}">${opSym}</span><span class="num">${q.b}</span><span class="${opClass}">=</span><span class="blank">?</span>`;
  if(labelId) document.getElementById(labelId).textContent=q.op==='+'?'加在一起是幾個？':'帶走之後還剩幾個？';
}

function renderVisual(q,vid){
  const el=document.getElementById(vid);el.innerHTML='';
  if(q.lv>1){el.style.display='none';return;}
  el.style.display='flex';
  const emoji=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  if(q.op==='+'){
    let emoji2;do{emoji2=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];}while(emoji2===emoji);
    const g1=document.createElement('div');g1.className='visual-group';
    const g2=document.createElement('div');g2.className='visual-group';
    for(let i=0;i<q.a;i++){const s=document.createElement('span');s.className='visual-emoji';s.textContent=emoji;g1.appendChild(s);}
    for(let i=0;i<q.b;i++){const s=document.createElement('span');s.className='visual-emoji';s.textContent=emoji2;g2.appendChild(s);}
    const op=document.createElement('div');op.className='op-sym';op.textContent='+';el.append(g1,op,g2);
  }else{
    const g=document.createElement('div');g.className='visual-group';
    for(let i=0;i<q.a;i++){const s=document.createElement('span');s.className='visual-emoji';s.textContent=emoji;g.appendChild(s);}
    el.appendChild(g);setTimeout(()=>{const spans=g.querySelectorAll('.visual-emoji');for(let i=q.a-q.b;i<q.a;i++)spans[i].classList.add('removed');},200);
  }
}

function renderOpts(opts,correct,gid,onSel){const g=document.getElementById(gid);g.innerHTML='';opts.forEach(v=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=v;btn.dataset.val=v;btn.onclick=()=>onSel(btn,v);g.appendChild(btn);});}

/* ── 練習模式 ── */
function startPractice(){const isAuto=getSelected('p-diff-mode')==='auto';const lv=isAuto?0:parseInt(getSelected('p-fixed-lv')||'0');PS={isAuto,lv,streak:0,xp:0,sel:null,selBtn:null,locked:false};document.getElementById('p-xp-wrap').style.display=isAuto?'':'none';pNext();showPage('page-practice');}
function pNext(){PS.sel=null;PS.selBtn=null;PS.locked=false;document.getElementById('p-confirm').classList.remove('ready');document.getElementById('p-fb').textContent='';document.getElementById('p-fb').className='feedback';const q=genQ(PS.lv);PS.q=q;document.getElementById('p-lv-badge').textContent='Lv '+(PS.lv+1);document.getElementById('p-op-badge').textContent=q.op==='+'?'➕ 加法':'➖ 減法';setTimeout(()=>playQuestionVO(q),400);renderVisual(q,'p-visual');renderEq(q,'p-eq','p-q-label');renderOpts(genOpts(q.answer,PS.lv),q.answer,'p-opts',(btn,val)=>{if(PS.locked)return;document.querySelectorAll('#p-opts .option-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');PS.sel=val;PS.selBtn=btn;playNumberVO(val);document.getElementById('p-confirm').classList.add('ready');});if(PS.isAuto){const need=XP_NEEDED[PS.lv]??1;document.getElementById('p-xp-bar').style.width=(PS.xp/need*100)+'%';}}
function practiceConfirm(){if(!PS.sel||PS.locked)return;PS.locked=true;const ok=parseInt(PS.sel)===PS.q.answer;const fb=document.getElementById('p-fb');document.querySelectorAll('#p-opts .option-btn').forEach(b=>{if(parseInt(b.dataset.val)===PS.q.answer)b.classList.add('correct');else if(b===PS.selBtn&&!ok)b.classList.add('wrong-sel');b.disabled=true;});if(ok){fb.textContent=['太棒了！🎉','答對了！⭐','超厲害！🌟','完美！✨'][Math.floor(Math.random()*4)];fb.className='feedback correct-msg';spawnParticles();spawnExp();PS.streak++;document.getElementById('p-streak').textContent=PS.streak;if(PS.isAuto){PS.xp++;const need=XP_NEEDED[PS.lv];if(need&&PS.xp>=need&&PS.lv<4){PS.lv++;PS.xp=0;showToast('🎯 升級！Lv '+(PS.lv+1),true);}}playOK(pNext);}else{fb.textContent=['再試一次！💪','沒關係，加油！😊','很接近了！🤏'][Math.floor(Math.random()*3)];fb.className='feedback wrong-msg';PS.streak=0;document.getElementById('p-streak').textContent=0;playNG(()=>{PS.selBtn.classList.remove('wrong-sel');PS.sel=null;PS.selBtn=null;PS.locked=false;document.getElementById('p-confirm').classList.remove('ready');document.querySelectorAll('#p-opts .option-btn').forEach(b=>b.disabled=false);});}}
function practiceSkip(){if(PS.locked)return;PS.streak=0;document.getElementById('p-streak').textContent=0;const fb=document.getElementById('p-fb');fb.textContent='跳過囉～下一題！';fb.className='feedback wrong-msg';PS.locked=true;playSkipVO(pNext);}

/* ── 挑戰模式 ── */
function startChallenge(){const diffVal=getSelected('c-diff');const count=parseInt(getSelected('c-count')||'10');const isAuto=diffVal==='auto';let lv=isAuto?0:parseInt(diffVal);const qs=[];for(let i=0;i<count;i++){qs.push({...genQ(lv),userAns:null,skipped:false});if(isAuto&&(i+1)%5===0&&lv<4)lv++;}CS={qs,count,cur:0,sel:null,selBtn:null};renderNav();cLoad(0);showPage('page-challenge');}
function renderNav(){const nav=document.getElementById('c-nav');nav.innerHTML='';CS.qs.forEach((q,i)=>{const d=document.createElement('div');d.className='nav-dot'+(i===CS.cur?' current':'');d.textContent=i+1;if(q.skipped)d.classList.add('skipped');else if(q.userAns!==null)d.classList.add('answered');d.onclick=()=>cGo(i);nav.appendChild(d);});}
function cGo(i){CS.cur=i;cLoad(i);renderNav();}
function cLoad(i){const q=CS.qs[i];CS.sel=null;CS.selBtn=null;document.getElementById('c-confirm').classList.remove('ready');document.getElementById('c-lv-badge').textContent='Lv '+(q.lv+1);document.getElementById('c-progress').textContent='第 '+(i+1)+' / '+CS.count+' 題';document.getElementById('c-prev').disabled=i===0;renderVisual(q,'c-visual');renderEq(q,'c-eq','c-q-label');renderOpts(genOpts(q.answer,q.lv),q.answer,'c-opts',(btn,val)=>{document.querySelectorAll('#c-opts .option-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');CS.sel=val;CS.selBtn=btn;playNumberVO(val);document.getElementById('c-confirm').classList.add('ready');});if(q.userAns!==null&&!q.skipped){document.querySelectorAll('#c-opts .option-btn').forEach(b=>{if(parseInt(b.dataset.val)===q.userAns)b.classList.add('selected');});}setTimeout(()=>playQuestionVO(q),400);}
function challengeConfirm(){if(!CS.sel)return;CS.qs[CS.cur].userAns=parseInt(CS.sel);CS.qs[CS.cur].skipped=false;renderNav();cAdvance();}
function challengeSkip(){CS.qs[CS.cur].userAns=null;CS.qs[CS.cur].skipped=true;renderNav();cAdvance();}
function challengePrev(){if(CS.cur>0)cGo(CS.cur-1);}
function cAdvance(){let next=-1;for(let i=CS.cur+1;i<CS.count;i++){if(CS.qs[i].userAns===null&&!CS.qs[i].skipped){next=i;break;}}if(next===-1){const allDone=CS.qs.every(q=>q.userAns!==null||q.skipped);if(allDone){setTimeout(showResult,300);return;}for(let i=0;i<CS.count;i++){if(CS.qs[i].userAns===null&&!CS.qs[i].skipped){next=i;break;}}}if(next!==-1)cGo(next);}
function showResult(){const perQ=CS.count===10?10:4;let correct=0;const wrong=[];CS.qs.forEach((q,i)=>{if(!q.skipped&&q.userAns===q.answer)correct++;else wrong.push({i,q});});const score=correct*perQ;document.getElementById('r-score').textContent=score;let emoji,msg;if(score===100){emoji='🏆';msg='太完美了！加減法都難不倒你！';}else if(score>=80){emoji='⭐';msg='好厲害！再加把勁就滿分了！';}else if(score>=60){emoji='💪';msg='做得好！繼續練習會更棒！';}else{emoji='😊';msg='沒關係，多練習就會進步！';}document.getElementById('r-emoji').textContent=emoji;document.getElementById('r-msg').textContent=msg;if(score===100){spawnParticles();playAudio('common/correct_1.mp3');}const wl=document.getElementById('r-wrong');wl.innerHTML='';if(wrong.length>0){const t=document.createElement('div');t.className='wrong-list-title';t.textContent='需要加強的題目';wl.appendChild(t);wrong.forEach(({i,q})=>{const d=document.createElement('div');d.className='wrong-item';const opSym=q.op==='+'?'+':'−';const eq=`第${i+1}題：${q.a} ${opSym} ${q.b} = ${q.answer}`;d.innerHTML=q.skipped?`<span class="wi-eq">${eq}</span><span class="wi-skip">（跳過）</span>`:`<span class="wi-eq">${eq}</span><span class="wi-your">你答：${q.userAns}</span>`;wl.appendChild(d);});}showPage('page-result');}
function syncFullscreenButton(){
  const label=document.fullscreenElement?'退出全螢幕':'全螢幕遊玩';
  document.querySelectorAll('.fullscreen-btn span').forEach(el=>el.textContent=label);
}
async function toggleFullscreen(){
  try{
    if(document.fullscreenElement)await document.exitFullscreen();
    else await document.documentElement.requestFullscreen();
  }catch(e){}
  syncFullscreenButton();
}
document.addEventListener('fullscreenchange',syncFullscreenButton);
</script>
