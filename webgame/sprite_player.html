<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d14;
    color: #e0d8f0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px 16px;
    user-select: none;
  }
  h1 {
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #5a4f7a;
  }
  canvas#game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid #2a2440;
    border-radius: 4px;
  }
  .hint {
    font-size: 11px;
    color: #3a3060;
    letter-spacing: 0.12em;
    text-align: center;
    line-height: 2;
  }
  .hint b { color: #7a60a8; }
  .info {
    font-size: 11px;
    color: #4a4070;
    letter-spacing: 0.1em;
  }
  .info span { color: #9b80d0; }
</style>
</head>
<body>
<h1>Sprite Player — Keyboard Control</h1>
<canvas id="game" width="720" height="300"></canvas>
<div class="hint">
  <b>← →</b> &nbsp;行走 &nbsp;｜&nbsp; <b>Z</b> &nbsp;攻擊 &nbsp;｜&nbsp; <b>X</b> &nbsp;特殊攻擊 &nbsp;｜&nbsp; 放開方向鍵 → idle
</div>
<div class="info">Action: <span id="infoAction">idle</span> &nbsp;|&nbsp; Frame: <span id="infoFrame">0</span> &nbsp;|&nbsp; X: <span id="infoX">360</span></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

// ── Sprite ──────────────────────────────────────────
const FRAME_W = 256;
const FRAME_H = 384;
const DISPLAY_SCALE = 0.55;
const DISPLAY_W = FRAME_W * DISPLAY_SCALE;  // ~141
const DISPLAY_H = FRAME_H * DISPLAY_SCALE;  // ~211

const frameMap = {
  idle:           { fps: 6,  loop: true,  row: 0 },
  walk:           { fps: 10, loop: true,  row: 1 },
  attack:         { fps: 12, loop: false, row: 2 },
  special_attack: { fps: 12, loop: false, row: 3 },
};
const FRAME_COUNT = 4;

const spriteSheet = new Image();
spriteSheet.src = 'sprite_sheet.png';

// ── Character state ──────────────────────────────────
const char = {
  x: W / 2,           // 螢幕中心 X（會循環）
  groundY: H - 40,    // 腳底 Y
  action: 'idle',
  frame: 0,
  elapsed: 0,
  facing: 1,          // 1=右, -1=左
  animDone: false,
  speed: 120,         // px/s
};

// ── Keys ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;

  if ((e.key === 'z' || e.key === 'Z') && !isLocked()) {
    setAction('attack');
  }
  if ((e.key === 'x' || e.key === 'X') && !isLocked()) {
    setAction('special_attack');
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function isLocked() {
  return (char.action === 'attack' || char.action === 'special_attack') && !char.animDone;
}

function setAction(action) {
  if (char.action === action) return;
  char.action = action;
  char.frame = 0;
  char.elapsed = 0;
  char.animDone = false;
}

// ── Background layers ─────────────────────────────────
// 三層視差：遠山、中景樹、近景地板
const BG = {
  // 遠山：簡單多邊形剪影
  mountains: [
    { x: 0,   w: 200, h: 90,  color: '#1a1530' },
    { x: 160, w: 180, h: 120, color: '#1e1838' },
    { x: 300, w: 220, h: 100, color: '#1a1530' },
    { x: 480, w: 200, h: 130, color: '#221d40' },
    { x: 640, w: 180, h: 95,  color: '#1a1530' },
  ],
  // 中景樹（視差 0.3）
  trees: [
    { x: 60,  h: 80 }, { x: 190, h: 100 }, { x: 340, h: 75 },
    { x: 490, h: 95 }, { x: 620, h: 85 },  { x: 760, h: 90 },
    { x: 900, h: 78 }, { x: 1050,h: 102 },
  ],
  // 遠景星星（固定）
  stars: Array.from({ length: 40 }, () => ({
    x: Math.random() * W,
    y: Math.random() * (H * 0.55),
    r: Math.random() * 1.5 + 0.5,
    a: Math.random() * 0.5 + 0.3,
  })),
};

// 視差偏移量（跟著角色 x 移動）
let bgOffset = 0;

function drawBackground() {
  // 天空漸層
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  sky.addColorStop(0, '#08060f');
  sky.addColorStop(1, '#1a1040');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 星星
  BG.stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,200,255,${s.a})`;
    ctx.fill();
  });

  // 遠山（視差 0.08）
  BG.mountains.forEach(m => {
    const ox = ((m.x - bgOffset * 0.08) % (W + 250) + W + 250) % (W + 250) - 250;
    ctx.beginPath();
    ctx.moveTo(ox, char.groundY);
    ctx.lineTo(ox + m.w * 0.3, char.groundY - m.h);
    ctx.lineTo(ox + m.w * 0.6, char.groundY - m.h * 0.7);
    ctx.lineTo(ox + m.w, char.groundY);
    ctx.closePath();
    ctx.fillStyle = m.color;
    ctx.fill();
  });

  // 月亮
  ctx.beginPath();
  ctx.arc(W * 0.82, 48, 28, 0, Math.PI * 2);
  ctx.fillStyle = '#f0e8c8';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W * 0.82 + 10, 44, 23, 0, Math.PI * 2);
  ctx.fillStyle = '#08060f';
  ctx.fill();

  // 中景樹（視差 0.3）
  BG.trees.forEach(t => {
    const ox = ((t.x - bgOffset * 0.3) % (W + 120) + W + 120) % (W + 120) - 120;
    // 樹幹
    ctx.fillStyle = '#120f20';
    ctx.fillRect(ox + 14, char.groundY - t.h * 0.4, 8, t.h * 0.4);
    // 樹冠（三角疊）
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      const ty = char.groundY - t.h * 0.35 - i * t.h * 0.22;
      const tw = 36 - i * 8;
      ctx.moveTo(ox + 18 - tw / 2, ty);
      ctx.lineTo(ox + 18 + tw / 2, ty);
      ctx.lineTo(ox + 18, ty - t.h * 0.28);
      ctx.closePath();
      ctx.fillStyle = i === 0 ? '#1a2818' : i === 1 ? '#1e3020' : '#223826';
      ctx.fill();
    }
  });

  // 地板
  ctx.fillStyle = '#12101e';
  ctx.fillRect(0, char.groundY, W, H - char.groundY);

  // 地板光帶
  const groundGrad = ctx.createLinearGradient(0, char.groundY, 0, char.groundY + 8);
  groundGrad.addColorStop(0, '#3a2f6a');
  groundGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, char.groundY, W, 8);

  // 地板格線（視差 1.0）
  ctx.strokeStyle = '#1e1a32';
  ctx.lineWidth = 1;
  const gridSpacing = 60;
  const gridOffset = bgOffset % gridSpacing;
  for (let gx = -gridOffset; gx < W + gridSpacing; gx += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(gx, char.groundY);
    ctx.lineTo(gx, H);
    ctx.stroke();
  }
}

function drawCharacter() {
  const anim = frameMap[char.action];
  const sx = char.frame * FRAME_W;
  const sy = anim.row * FRAME_H;

  const drawX = char.x - DISPLAY_W / 2;
  const drawY = char.groundY - DISPLAY_H;

  ctx.save();
  if (char.facing === -1) {
    // 鏡像：以角色中心翻轉
    ctx.translate(char.x, 0);
    ctx.scale(-1, 1);
    ctx.translate(-char.x, 0);
  }
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(
    spriteSheet,
    sx, sy, FRAME_W, FRAME_H,
    drawX, drawY, DISPLAY_W, DISPLAY_H
  );
  ctx.restore();
}

// ── Main loop ─────────────────────────────────────────
let lastTime = 0;

function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // 移動與動作
  if (!isLocked()) {
    const left  = keys['ArrowLeft']  || keys['a'] || keys['A'];
    const right = keys['ArrowRight'] || keys['d'] || keys['D'];

    if (right) {
      char.facing = 1;
      char.x += char.speed * dt;
      setAction('walk');
    } else if (left) {
      char.facing = -1;
      char.x -= char.speed * dt;
      setAction('walk');
    } else {
      if (char.action === 'walk') setAction('idle');
    }
  }

  // X 循環
  if (char.x > W + DISPLAY_W / 2)  char.x = -DISPLAY_W / 2;
  if (char.x < -DISPLAY_W / 2)     char.x = W + DISPLAY_W / 2;

  // 背景視差偏移（跟角色速度）
  if (!isLocked()) {
    const left  = keys['ArrowLeft']  || keys['a'] || keys['A'];
    const right = keys['ArrowRight'] || keys['d'] || keys['D'];
    if (right) bgOffset += char.speed * dt;
    if (left)  bgOffset -= char.speed * dt;
  }

  // Frame 更新
  const anim = frameMap[char.action];
  char.elapsed += dt;
  const frameDur = 1 / anim.fps;
  if (!char.animDone && char.elapsed >= frameDur) {
    char.elapsed = 0;
    char.frame++;
    if (char.frame >= FRAME_COUNT) {
      if (anim.loop) {
        char.frame = 0;
      } else {
        char.frame = FRAME_COUNT - 1;
        char.animDone = true;
        setTimeout(() => setAction('idle'), 150);
      }
    }
  }

  // 繪製
  drawBackground();
  drawCharacter();

  // UI
  document.getElementById('infoAction').textContent = char.action;
  document.getElementById('infoFrame').textContent = char.frame;
  document.getElementById('infoX').textContent = Math.round(char.x);

  requestAnimationFrame(loop);
}

spriteSheet.onload = () => requestAnimationFrame(loop);
spriteSheet.onerror = () => {
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#7a60a8';
  ctx.font = '13px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('找不到 sprite_sheet.png', W/2, H/2 - 10);
  ctx.fillStyle = '#3a3060';
  ctx.fillText('請將圖片與 HTML 放在同一目錄', W/2, H/2 + 14);
};
</script>
</body>
</html>
